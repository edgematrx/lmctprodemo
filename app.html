/* Nav items */
/* ═══ SIDEBAR NAV — 2026 PREMIUM ═══ */
/* Color psychology: size = authority, amber = urgency, green = growth, purple = AI premium */

.nav-section{
  font-size:10px;color:rgba(255,255,255,.28);text-transform:uppercase;
  letter-spacing:2px;padding:18px 14px 6px;font-weight:900;
  display:flex;align-items:center;gap:6px
}
.nav-section::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.08),transparent)}

.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:11px 14px;  /* bigger hit area */
  border-radius:12px;
  cursor:pointer;width:100%;text-align:left;border:none;
  font-family:inherit;font-size:14px;font-weight:500; /* UP from 12.5px */
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  margin-bottom:2px;position:relative;overflow:hidden;
  letter-spacing:-.2px;line-height:1.2
}
.nav-item::before{
  content:'';position:absolute;left:0;top:15%;height:70%;width:3px;
  border-radius:0 4px 4px 0;background:transparent;transition:all .2s
}
.nav-item.active{font-weight:700;font-size:14.5px}
.nav-item.active::before{background:linear-gradient(180deg,#f5a623,#7c6fff)}
.nav-item:hover:not(.active){
  background:rgba(255,255,255,.06)!important;
  transform:translateX(2px)
}
.nav-item:active{transform:scale(.97)}

/* Icon container — gives each icon a subtle colored background */
.nav-item-icon{
  font-size:17px;flex-shrink:0;
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);
  transition:all .2s
}
.nav-item.active .nav-item-icon{background:rgba(245,166,35,.12)}
.nav-item-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* AI badge — purple glow */
.nav-ai-label{
  font-size:9px;background:rgba(124,111,255,.25);color:#c4bcff;
  padding:2px 7px;border-radius:20px;font-weight:800;letter-spacing:.5px;
  flex-shrink:0;border:1px solid rgba(124,111,255,.3);
  text-transform:uppercase
}

/* Count badge — amber for urgency */
.nav-badge{
  font-size:11px;font-weight:800;padding:3px 8px;
  border-radius:20px;min-width:24px;text-align:center;flex-shrink:0;
  letter-spacing:-.3px
}

/* Topbar */

.topbar-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:3px;font-family:monospace;letter-spacing:.3px}

<script>
// ── SOUND SYSTEM ──
window.SFX={
  _ctx:null,
  _get(){if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();return this._ctx;},
  play(type){
    try{
      const ctx=this._get();
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      const now=ctx.currentTime;
      if(type==='sell'){
        // Success chime — ascending tones
        o.type='sine';
        o.frequency.setValueAtTime(440,now);
        o.frequency.exponentialRampToValueAtTime(660,now+0.1);
        o.frequency.exponentialRampToValueAtTime(880,now+0.2);
        g.gain.setValueAtTime(0.3,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
        o.start(now);o.stop(now+0.5);
      } else if(type==='click'){
        o.type='sine';o.frequency.setValueAtTime(600,now);
        g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
        o.start(now);o.stop(now+0.08);
      } else if(type==='save'){
        o.type='sine';
        o.frequency.setValueAtTime(523,now);
        o.frequency.setValueAtTime(659,now+0.1);
        g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
        o.start(now);o.stop(now+0.35);
      } else if(type==='alert'){
        o.type='square';o.frequency.setValueAtTime(220,now);
        g.gain.setValueAtTime(0.1,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
        o.start(now);o.stop(now+0.3);
      } else if(type==='nav'){
        o.type='sine';o.frequency.setValueAtTime(880,now);
        g.gain.setValueAtTime(0.08,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
        o.start(now);o.stop(now+0.06);
      }
    }catch(e){}
  }
};

</script>

function DataPage({stock,setStock,sold,setSold,cust,setCust}){
  function exportCSV(){
    const rows=[["ID","Make","Model","Year","Colour","Body","Rego","Price","Purchase","Recon","Status","Acquired"]].concat(stock.map(function(c){return [c.id,c.make,c.model,c.year,c.colour,c.body,c.rego,c.price,c.purchase,c.recon,c.status,c.acq];}));
    const csv=rows.map(function(r){return r.join(",");}).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="lmct_stock.csv";a.click();
  }
  function importCSV(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=function(ev){
      try{
        const lines=ev.target.result.split("\n").slice(1).filter(Boolean);
        const imported=lines.map(function(l,idx){const p=l.split(",");return {id:Date.now()+idx,make:p[1]||"",model:p[2]||"",year:parseInt(p[3])||2020,colour:p[4]||"",body:p[5]||"Sedan",rego:p[6]||"",price:parseFloat(p[7])||0,purchase:parseFloat(p[8])||0,recon:parseFloat(p[9])||800,status:p[10]||"Available",acq:p[11]||new Date().toISOString().split("T")[0],score:70};});
        setStock(function(s){return s.concat(imported);});
        localStorage.setItem("lmct_stock",JSON.stringify(stock.concat(imported)));
        alert(imported.length+" vehicles imported!");
      }catch(err){alert("Import failed. Check file format.");}
    };
    r.readAsText(f);
  }
  return <div style={{maxWidth:480}}>
    <div style={{background:C.s1,border:"1px solid "+C.b1,borderRadius:14,padding:"20px"}}>
      <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>Import / Export</div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <Btn v="primary" full sz="lg" onClick={exportCSV}>📥 Export Stock to CSV</Btn>
        <label style={{display:"block",padding:"12px 22px",background:C.s2,border:"1px solid "+C.b2,borderRadius:9,color:C.t2,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
          📤 Import CSV
          <input type="file" accept=".csv" onChange={importCSV} style={{display:"none"}}/>
        </label>
      </div>
      <div style={{marginTop:16,background:C.s2,borderRadius:8,padding:"10px 12px",fontSize:11,color:C.t3}}>
        💡 EasyCars users: Export your stock as CSV from EasyCars settings, then import here.
      </div>
    </div>
  </div>;
}

function DonutChart({segments,size=120,thick=18,label,sub}){
  const r=(size-thick)/2,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r;
  const total=segments.reduce((a,s)=>a+s.v,0)||1;
  let offset=0;
  const slices=segments.map(s=>{const pct=s.v/total;const dash=pct*circ;const gap=circ-dash;const sl={...s,dash,gap,offset};offset+=dash;return sl;});
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:"rotate(-90deg)"}}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth={thick}/>
    {slices.map((s,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={thick} strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={-s.offset} strokeLinecap="round"/>)}
    <text x={cx} y={cy-6} textAnchor="middle" fill="white" fontSize={size/6} fontWeight="900" style={{transform:"rotate(90deg)",transformOrigin:`${cx}px ${cy}px`}}>{label}</text>
    <text x={cx} y={cy+10} textAnchor="middle" fill="rgba(255,255,255,.4)" fontSize={size/10} style={{transform:"rotate(90deg)",transformOrigin:`${cx}px ${cy}px`}}>{sub}</text>
  </svg>;
}

function BarChart({data,h=80}){

  const max=Math.max(...data.map(d=>d.v),1);
  const w=100/data.length;
  return <svg width="100%" height={h} viewBox={`0 0 100 ${h}`} preserveAspectRatio="none">
    {data.map((d,i)=>{const barH=Math.max((d.v/max)*(h-14),1);const x=i*w+w*.15;const bw=w*.7;const y=h-barH-12;return <g key={i}>
      <rect x={x} y={h-12} width={bw} height={barH} rx={1.5} fill={d.color||"rgba(124,111,255,.6)"}/>
      <text x={x+bw/2} y={h-2} textAnchor="middle" fill="rgba(255,255,255,.3)" fontSize={6}>{d.label}</text>
      {d.v>0&&<text x={x+bw/2} y={y-2} textAnchor="middle" fill={d.color||"rgba(255,255,255,.6)"} fontSize={6} fontWeight="700">{d.v}</text>}
    </g>;})}
  </svg>;
}

function Spark({data,color,h=36,w=100}){
  if(!data||data.length<2)return null;
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/range)*(h-4)-2}`).join(" ");
  const area=`M ${pts.split(" ")[0]} L ${pts} L ${w},${h} L 0,${h} Z`;
  return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#sg)"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

function AddCar({setStock,setPage}){
  const MAKES=["Toyota","Mazda","Ford","Hyundai","Honda","Kia","Mitsubishi","Subaru","Nissan","Volkswagen","BMW","Mercedes-Benz","Audi","Holden","Isuzu","LDV","GWM","BYD","Tesla","Other"];

      const d=await res.json();
      const v=JSON.parse((d.choices?.[0]?.message?.content||d.content?.[0]?.text||"{}").replace(/\`\`\`json|\`\`\`/g,"").trim());
      if(v.make)setF(p=>({...p,make:v.make||p.make,model:v.model||p.model,year:v.year||p.year,colour:v.colour||p.colour,body:v.body||p.body,trans:v.trans||p.trans,fuel:v.fuel||p.fuel,odo:v.odo?String(v.odo):p.odo,regoExp:v.regoExp||p.regoExp,vin:v.vin||p.vin}));
    }catch(e){}

  const card=(title,children)=><div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:13,padding:"16px 18px",marginBottom:10}}><div style={{fontWeight:800,fontSize:14,marginBottom:12,color:C.acc2}}>{title}</div>{children}</div>;
  const G=(label,input,full)=><div style={{gridColumn:full?"1/-1":"",display:"flex",flexDirection:"column",gap:5}}><label style={{fontSize:10,color:C.t3,fontWeight:700,textTransform:"uppercase",letterSpacing:.7}}>{label}</label>{input}</div>;

  const S=(k,opts)=><Sel value={f[k]} onChange={up(k)} options={opts}/>;
  return <div style={{maxWidth:620}}>
    {card("🔍 Rego Lookup — Auto-fill",<div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
      <div style={{flex:1}}>{G("Rego Plate",I("rego","ABC 123"))}</div>
      <Btn v="primary" onClick={lookupRego} disabled={saving||f.rego.length<5}>{saving?"Looking up...":"🔍 Auto-fill from Plate"}</Btn>
    </div>)}
    {card("🚗 Vehicle Details",<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {G("Make",S("make",MAKES))}{G("Model",I("model","Camry"))}{G("Year",I("year","2021","number"))}{G("Badge/Variant",I("badge","SL Hybrid"))}
      {G("Colour",I("colour","White"))}{G("Body Type",S("body",BODIES))}{G("Transmission",S("trans",["Automatic","Manual","CVT"]))}{G("Fuel Type",S("fuel",["Petrol","Diesel","Hybrid","Electric","PHEV"]))}
      {G("Odometer (km)",I("odo","52000","number"))}{G("VIN",I("vin",""))}
    </div>)}
    {card("💰 Pricing",<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {G("Sale Price ($)",I("price","33490","number"))}{G("Purchase Cost ($)",I("purchase","26800","number"))}
      {G("Recon Cost ($)",I("recon","800","number"))}{G("Other Costs ($)",I("other","200","number"))}
    </div>)}
    {card("📋 Compliance & Source",<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {G("Rego Plate",I("rego","ABC 123"))}{G("Rego Expiry",I("regoExp","","date"))}

    </div>)}
    <div style={{display:"flex",gap:9}}>
      <Btn v="primary" full sz="lg" onClick={save} disabled={saving}>💾 Add to Stock</Btn>

function MarketIntelligence({stock,sold,ul,onReq}){
  if(!ul)return <div style={{maxWidth:480,margin:"40px auto",textAlign:"center"}}>
    <div style={{background:C.s1,border:`1px solid ${C.b2}`,borderRadius:16,padding:48}}>
      <div style={{fontSize:48,marginBottom:14}}>📊</div>
      <div style={{fontSize:20,fontWeight:800,marginBottom:10}}>Market Intelligence</div>
      <div style={{fontSize:14,color:C.t3,marginBottom:24,lineHeight:1.7}}>Your dealership pricing patterns, sell rates and profit analysis. Manager only.</div>
      <Btn v="primary" onClick={onReq}>Enter Manager PIN to Access</Btn>
    </div>
  </div>;
  function open(){try{localStorage.setItem("lmct_stock",JSON.stringify(stock));localStorage.setItem("lmct_sold",JSON.stringify(sold));const w=window.open("intel.html","_blank");if(!w)alert("Please allow popups.");}catch(e){alert("Error: "+e.message);}}
  const active=stock.filter(c=>c.status!=="Sold");
  const makeStats={};sold.forEach(s=>{if(!makeStats[s.make])makeStats[s.make]={count:0,sale:0,profit:0};makeStats[s.make].count++;makeStats[s.make].sale+=s.sale||0;makeStats[s.make].profit+=s.profit||0;});
  const topMake=Object.entries(makeStats).sort((a,b)=>b[1].count-a[1].count)[0];
  const avgSale=sold.length?Math.round(sold.reduce((a,s)=>a+s.sale,0)/sold.length):0;
  const dtsAll=[];sold.forEach(s=>{const match=stock.find(c=>c.rego===s.rego||(c.make===s.make&&c.model===s.model&&c.year===s.year));if(match&&match.acq&&s.date){const d=Math.round((new Date(s.date)-new Date(match.acq))/86400000);if(d>0&&d<365)dtsAll.push({price:s.sale,days:d});}});
  const fastDTS=dtsAll.filter(d=>d.price<20000);const slowDTS=dtsAll.filter(d=>d.price>=20000);
  const avgFast=fastDTS.length?Math.round(fastDTS.reduce((a,d)=>a+d.days,0)/fastDTS.length):null;
  const avgSlow=slowDTS.length?Math.round(slowDTS.reduce((a,d)=>a+d.days,0)/slowDTS.length):null;
  const insights=[];
  if(topMake)insights.push({icon:"🏆",text:`Your last ${topMake[1].count} ${topMake[0]}s sold at avg ${fm(Math.round(topMake[1].sale/topMake[1].count))}`});
  if(avgFast&&avgSlow&&avgFast<avgSlow)insights.push({icon:"🚀",text:`Cars under $20k sell ${Math.round(((avgSlow-avgFast)/avgSlow)*100)}% faster (${avgFast}d vs ${avgSlow}d)`});
  if(sold.length)insights.push({icon:"💡",text:`Overall avg sale price: ${fm(avgSale)}`});
  return <div style={{background:C.s1,border:`1px solid rgba(124,111,255,.2)`,borderRadius:14,overflow:"hidden"}}>
    <div style={{background:"linear-gradient(135deg,rgba(124,111,255,.12),rgba(31,217,122,.06))",padding:"16px 20px",borderBottom:`1px solid rgba(124,111,255,.15)`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:40,height:40,borderRadius:10,background:"rgba(124,111,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📊</div>
        <div><div style={{fontWeight:800,fontSize:15}}>Market Intelligence</div><div style={{fontSize:11,color:C.t3,marginTop:1}}>Your private pricing and performance data</div></div>
      </div>
      <button onClick={open} style={{padding:"9px 18px",background:C.acc,border:"none",borderRadius:8,color:"white",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Open Full Report →</button>
    </div>
    <div style={{padding:"14px 18px"}}>
      {insights.length>0?<div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>
        {insights.map((ins,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",background:C.s2,borderRadius:9,border:`1px solid ${C.b1}`}}>
          <span style={{fontSize:16}}>{ins.icon}</span><span style={{fontSize:13,color:C.t1}}>{ins.text}</span>
        </div>)}
      </div>:<div style={{color:C.t3,fontSize:13,marginBottom:14,textAlign:"center",padding:"14px 0"}}>Add sales to see your market intelligence</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {[["Total Sold",sold.length,C.g],["In Stock",active.length,C.b],["Avg Sale",fm(avgSale),C.a]].map(([l,v,col])=><div key={l} style={{background:C.s2,borderRadius:9,padding:"10px 13px",textAlign:"center"}}>
          <div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>{l}</div>
          <div style={{fontSize:18,fontWeight:800,color:col}}>{v}</div>
        </div>)}
      </div>
    </div>
  </div>;
}

function sendSaleEmail(sale, car, dp){
  return new Promise(function(resolve){
    var es=gES();
    if(!es.apiKey){resolve({sent:false});return;}
    fetch("https://api.resend.com/emails",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+es.apiKey},
      body:JSON.stringify({
        from:es.senderEmail||dp.email||"sales@lmctpro.com.au",
        to:[sale.bEmail||sale.email||""],
        subject:"Your purchase confirmation — "+car.year+" "+car.make+" "+car.model,
        html:"<p>Dear "+sale.buyer+",</p><p>Thank you for your purchase of the "+car.year+" "+car.make+" "+car.model+".</p><p>Sale price: $"+sale.sale+"</p><p>"+dp.dealerName+"</p>"
      })
    }).then(function(r){resolve({sent:r.ok});}).catch(function(){resolve({sent:false});});
  });
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error: null}; }
  componentDidCatch(error, info) {
    if(window.__done) window.__done();
    this.setState({error: error.message + "\n\n" + error.stack + "\n\n" + JSON.stringify(info)});
  }
  static getDerivedStateFromError(error) { return {error: error.message + "\n" + error.stack}; }
  render() {
    if(this.state.error) {
      return <div style={{color:"#ff4f4f",background:"#06060f",padding:30,fontFamily:"monospace",fontSize:12,minHeight:"100vh"}}>
        <h2 style={{color:"#ff4f4f"}}>REACT RENDER ERROR</h2>
        <pre style={{color:"#f5a623",whiteSpace:"pre-wrap"}}>{this.state.error}</pre>
      </div>;
    }
    return this.props.children;
  }
}
