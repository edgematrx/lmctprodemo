*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui,sans-serif;background:#06060f;color:#f0f0fa;-webkit-font-smoothing:antialiased} @keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

.ls{font-size:8px;color:#35354e;font-family:monospace;letter-spacing:4px;text-transform:uppercase;margin-bottom:32px}
.lbar{width:200px;height:1.5px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.lfill{height:100%;width:0;background:linear-gradient(90deg,#7c6fff,#a89dff,#7c6fff);background-size:200%;animation:shimmerLoad 1.5s infinite;border-radius:2px;transition:width .3s}
@keyframes shimmerLoad{0%{background-position:0%}100%{background-position:200%}}
.ltxt{font-size:10px;color:#35354e;margin-top:12px;font-family:monospace;letter-spacing:.5px} .po{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(16px)}

.pdot.err{background:#ff4f4f;border-color:#ff4f4f;animation:shk .3s}

.pk:hover{background:rgba(124,111,255,.18);border-color:rgba(124,111,255,.4);transform:translateY(-1px)}
.pk:active{transform:scale(.92)}
.pz{grid-column:2}.pdl{font-size:12px;color:#5a5a78} ::-webkit-scrollbar{width:3px;height:3px}

.days-warn{background:rgba(245,166,35,.1);color:#f5a623;border:1px solid rgba(245,166,35,.2)}
.days-bad{background:rgba(255,79,79,.1);color:#ff4f4f;border:1px solid rgba(255,79,79,.2)} @media print{#root{overflow:visible!important}.noprint{display:none!important}body{background:white;color:#111}}

/* Nav items */
.nav-section{font-size:9px;color:rgba(255,255,255,.18);text-transform:uppercase;letter-spacing:1.8px;padding:14px 11px 4px;font-weight:800}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;cursor:pointer;width:100%;text-align:left;border:none;font-family:inherit;font-size:12.5px;font-weight:500;transition:all .18s;margin-bottom:1px;position:relative;overflow:hidden;letter-spacing:-.1px}
.nav-item::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;border-radius:0 3px 3px 0;background:transparent;transition:all .18s}
.nav-item.active::before{background:linear-gradient(180deg,#a89dff,#7c6fff)}
.nav-item.active{font-weight:700}
.nav-item:hover:not(.active){background:rgba(255,255,255,.04)!important}
.nav-item-icon{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.nav-item-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-ai-label{font-size:8px;background:rgba(124,111,255,.22);color:rgba(168,157,255,.9);padding:1px 6px;border-radius:8px;font-weight:800;letter-spacing:.5px;flex-shrink:0;border:1px solid rgba(124,111,255,.2)}
.nav-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center;flex-shrink:0}

/* Topbar */
.topbar{display:flex;align-items:center;gap:12px;padding:0 24px;height:56px;border-bottom:1px solid rgba(255,255,255,.055);background:linear-gradient(180deg,rgba(255,255,255,.03) 0%,transparent 100%);flex-shrink:0}
.topbar-title{font-size:17px;font-weight:800;letter-spacing:-.5px;line-height:1}
.topbar-sub{font-size:10px;color:rgba(255,255,255,.25);margin-top:2px;font-family:monospace;letter-spacing:.3px}
.ai-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:rgba(31,217,122,.8);background:rgba(31,217,122,.07);border:1px solid rgba(31,217,122,.15);padding:5px 11px;border-radius:20px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#1fd97a;animation:livePulse 2s infinite;flex-shrink:0}

/* Content area */
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 24px;animation:fadeIn .25s ease}
.content-area::-webkit-scrollbar{width:3px}
.content-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}

// ── PIN MODAL ──
function PINModal({onSuccess,onClose}){
  const m=gDM();
  const [pin,setPin]=useState([]),[err,setErr]=useState(false);
  function press(d){
    if(pin.length>=4)return;
    const np=[...pin,d];
    setPin(np);
    if(np.length===4){
      if(np.join("")===String(m.pin)){setTimeout(onSuccess,150);}
      else{setTimeout(()=>{setPin([]);setErr(true);setTimeout(()=>setErr(false),600);},200);}
    }
  }
  return <div className="po"><div className="pb">
    <div style={{fontSize:13,fontWeight:700,color:C.t1,marginBottom:4}}>Manager PIN</div>
    <div style={{fontSize:12,color:C.t3,marginBottom:16}}>Enter your 4-digit PIN</div>
    <div className="pd">{[0,1,2,3].map(i=><div key={i} className={`pdot${pin.length>i?" on":""}${err?" err":""}`}/>)}</div>
    <div className="pg">{[1,2,3,4,5,6,7,8,9].map(n=><button key={n} className="pk" onClick={()=>press(String(n))}>{n}</button>)}<div/><button className="pk pz" onClick={()=>press("0")}>0</button><button className="pk" onClick={()=>setPin(p=>p.slice(0,-1))}>⌫</button></div>
    <div className="pdl" style={{marginTop:14,cursor:"pointer",color:C.t3,fontSize:11}} onClick={onClose}>Cancel</div>
  </div></div>;
}

// ── DATA PAGE ──
function DataPage({stock,sold,cust}){
  function dl(csv,name){const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
  function esc(v){const s=v===null||v===undefined?"":String(v);return s.includes(",")||s.includes("\n")||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;}
  function toCSV(rows,headers){return [headers.join(","),...rows.map(r=>headers.map(h=>esc(r[h])).join(","))].join("\n");}
  function exportAll(){
    const dp=gDP();
    let out=`LMCT PRO Export\n${dp.dealerName} | LMCT ${dp.lmct} | ${new Date().toLocaleString("en-AU")}\n\n=== STOCK ===\n`;
    out+=toCSV(stock,["id","make","model","year","colour","body","trans","fuel","odo","rego","vin","purchase","price","recon","other","source","acq","ppsr","regoExp","seller","notes","status"])+"\n\n=== SALES ===\n";
    out+=toCSV(sold,["id","make","model","year","rego","sale","cost","profit","buyer","bPhone","date","pay"])+"\n\n=== CUSTOMERS ===\n";
    out+=toCSV(cust,["id","first","last","phone","email","addr","status","notes"]);
    dl(out,`lmctpro_backup_${new Date().toISOString().split("T")[0]}.csv`);
  }
  function openImport(){try{const w=window.open("data.html","_blank");if(!w)alert("Allow popups to open import tool.");}catch(e){alert("Error: "+e.message);}}
  return <div style={{maxWidth:600}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,padding:22,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:10}}>💾</div>
        <div style={{fontWeight:700,fontSize:15,marginBottom:5}}>Export All Data</div>
        <div style={{fontSize:12,color:C.t3,marginBottom:14,lineHeight:1.6}}>{stock.length} vehicles · {sold.length} sales · {cust.length} customers</div>
        <Btn v="primary" full onClick={exportAll}>Download Backup (.csv)</Btn>
      </div>
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,padding:22,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:10}}>📥</div>
        <div style={{fontWeight:700,fontSize:15,marginBottom:5}}>Import from EasyCars</div>
        <div style={{fontSize:12,color:C.t3,marginBottom:14,lineHeight:1.6}}>Upload CSV from EasyCars, DealerSocket or any DMS</div>
        <Btn v="green" full onClick={openImport}>Open Import Tool</Btn>
      </div>
    </div>
    <div style={{background:C.s2,borderRadius:9,padding:"11px 14px",fontSize:12,color:C.t3,border:`1px solid ${C.b1}`}}>💡 Export regularly as a backup. Import opens a full preview tool in a new tab.</div>
  </div>;
}

  function loadTasks(){
    try{
      const raw=localStorage.getItem(SK);
      if(raw)return JSON.parse(raw);
      const auto=[];
      const active=stock.filter(c=>c.status!=="Sold");
      const aged=active.filter(c=>dAgo(c.acq)>45).slice(0,2);
      aged.forEach(c=>auto.push({id:Date.now()+Math.random(),text:`Reprice ${c.year} ${c.make} ${c.model} — ${dAgo(c.acq)} days in stock`,done:false,type:"reprice",auto:true,assignee:"",completedBy:"",completedAt:"",note:""}));
      const leads=cust.filter(c=>c.status==="Hot Lead").slice(0,2);
      leads.forEach(c=>auto.push({id:Date.now()+Math.random(),text:`Follow up ${c.first} ${c.last} — ${c.phone||"no phone"}`,done:false,type:"followup",auto:true,assignee:"",completedBy:"",completedAt:"",note:""}));

      return auto;
    }catch(e){return[];}
  }
  const [tasks,setTasks]=useState(()=>{const t=loadTasks();try{localStorage.setItem(SK,JSON.stringify(t));}catch(e){}return t;});

      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {total>0&&<div style={{display:"flex",alignItems:"center",gap:6}}>

            <div style={{width:pct+"%",height:"100%",background:pct===100?C.g:C.acc,borderRadius:3,transition:"width .4s"}}/>

    <div style={{padding:"6px 0"}}>

// ── DASHBOARD ──
function Dashboard({stock,sold,cust,setPage,ul,onReq}){
  const active=stock.filter(c=>c.status!=="Sold");
  const reserved=active.filter(c=>c.status==="Reserved");
  const thisMonth=new Date().toISOString().slice(0,7);
  const mtdSales=sold.filter(s=>s.date&&s.date.startsWith(thisMonth));
  const mtdRev=mtdSales.reduce((a,s)=>a+s.sale,0);
  const mtdProfit=mtdSales.reduce((a,s)=>a+(s.profit||0),0);
  const totalRev=sold.reduce((a,s)=>a+s.sale,0);
  const sv=active.reduce((a,c)=>a+c.price,0);
  const cost=active.reduce((a,c)=>a+(c.purchase||0)+(c.recon||0)+(c.other||0),0);
  const hotLeads=cust.filter(c=>c.status==="Hot Lead");
  const aged60=active.filter(c=>dAgo(c.acq)>60);
  const aged30=active.filter(c=>dAgo(c.acq)>30&&dAgo(c.acq)<=60);
  const alerts=active.filter(c=>c.regoExp&&dUntil(c.regoExp)<30);
  const avgScore=active.length?Math.round(active.reduce((a,c)=>a+(c.score||70),0)/active.length):0;

  // Inventory health 0-100
  const healthScore=active.length?Math.round(
    (active.filter(c=>dAgo(c.acq)<=30).length/active.length)*100
  ):100;

  return <div style={{display:"flex",flexDirection:"column",gap:14}}>

    {/* ── REGO ALERTS ── */}
    {alerts.length>0&&<div style={{display:"flex",flexDirection:"column",gap:5}}>
      {alerts.slice(0,2).map(c=>{const d=dUntil(c.regoExp);return <div key={c.id} style={{background:d<=0?C.rd:"rgba(245,166,35,.06)",border:`1px solid ${d<=0?C.rb:C.ab}`,borderRadius:10,padding:"9px 14px",display:"flex",alignItems:"center",gap:9,fontSize:12}}>

        <span style={{flex:1,color:C.t1}}><strong>{c.year} {c.make} {c.model}</strong> ({c.rego}) — {d<=0?"rego EXPIRED":`rego expires in ${d} days`}</span>

      <StatCard label="MTD Revenue" value={fm(mtdRev)} sub={`${mtdSales.length} sales this month`} color={C.g} icon="💰"/>

function AddCar({setStock,setPage}){
  const blank={make:"",model:"",year:"",colour:"",body:"",trans:"",fuel:"",odo:"",engine:"",drive:"",rego:"",vin:"",purchase:"",price:"",recon:"",other:"",source:"",acq:new Date().toISOString().split("T")[0],ppsr:"Clear",regoExp:"",seller:"",sellerAddr:"",notes:""};

  const [regoQ,setRegoQ]=useState("");
  const [regoLoading,setRegoLoading]=useState(false);

    sf(p=>{
      const next={...p,[k]:v};

      setAiScore2(s);
      if(!next.price&&next.make&&next.year){next.price=String(suggestP(next.make,next.model,parseInt(next.year),parseInt(next.odo)||50000));}
      return next;
    });

  // AutoGrab-style rego lookup (simulated — replace with real API key)
  function lookupRego(){
    const plate=regoQ.trim().toUpperCase();
    if(!plate){alert("Enter a plate number.");return;}
    setRegoLoading(true);setRegoFound(null);
    // Simulate API — in production swap for AutoGrab: https://api.autograb.com.au

function RegoSearch({setStock,setPage}){

  const [imgB64,setImgB64]=useState(null);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState(null);
  const [confirmed,setConfirmed]=useState(false);
  const [pl,setPl]=useState("");
  const fileRef=React.useRef();

  function onFile(e){
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const url=URL.createObjectURL(file);
    setImg(url);
    setResult(null);setErr(null);setConfirmed(false);
    const reader=new FileReader();
    reader.onload=ev=>{
      const b64=ev.target.result.split(",")[1];
      setImgB64(b64);
    };
    reader.readAsDataURL(file);
  }

  async function scanPhoto(){
    if(!imgB64){setErr("No image loaded.");return;}
    setLoading(true);setErr(null);setResult(null);setConfirmed(false);
    const prompt=`You are an expert Australian automotive identifier. Analyse this vehicle photo carefully.

The photo may show:
1. A rear/front/side view of a vehicle — identify the make, model, year, colour, body type
2. A Victorian number plate — read the plate alphanumeric characters exactly

Return ONLY raw JSON, no markdown:
{
  "plate": "<plate text if visible, e.g. ABC123, or null if not visible>",
  "make": "<manufacturer, e.g. Toyota>",
  "model": "<model name, e.g. Camry>",
  "year": <estimated year as number, e.g. 2019>,
  "yearRange": "<e.g. 2018-2020 if uncertain>",
  "colour": "<primary colour>",
  "body": "<Sedan|Hatchback|SUV|Ute|Van|Wagon|Coupe|Convertible>",
  "trans": "<Automatic|Manual|Unknown>",
  "fuel": "<Petrol|Diesel|Hybrid|Electric|Unknown>",
  "engine": "<e.g. 2.5L 4-cyl or Unknown>",
  "confidence": <0-100, how confident you are>,
  "notes": "<any important observations, e.g. facelift model, sport variant, damaged panels>"
}

If you cannot identify the vehicle at all, return: {"error": "Cannot identify vehicle from this image"}`;

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:500,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgB64}},
            {type:"text",text:prompt}
          ]}]
        })
      });
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      if(parsed.error){setErr(parsed.error);}
      else{setResult(parsed);}
    }catch(e){
      setErr("Could not identify vehicle. Try a clearer photo showing the rear or number plate.")
    }
    setLoading(false);
  }

function MarketIntelligence({stock,sold,ul,onReq}){
  if(!ul)return <div style={{maxWidth:480,margin:"40px auto",textAlign:"center"}}>
    <div style={{background:C.s1,border:`1px solid ${C.b2}`,borderRadius:16,padding:48}}>

      <div style={{fontSize:20,fontWeight:800,marginBottom:10}}>Market Intelligence</div>
      <div style={{fontSize:14,color:C.t3,marginBottom:24,lineHeight:1.7}}>Your dealership pricing patterns, sell rates and profit analysis. Manager only.</div>
      <Btn v="primary" onClick={onReq}>Enter Manager PIN to Access</Btn>
    </div>
  </div>;
  function open(){try{localStorage.setItem("lmct_stock",JSON.stringify(stock));localStorage.setItem("lmct_sold",JSON.stringify(sold));const w=window.open("intel.html","_blank");if(!w)alert("Please allow popups.");}catch(e){alert("Error: "+e.message);}}
  const active=stock.filter(c=>c.status!=="Sold");
  const makeStats={};sold.forEach(s=>{if(!makeStats[s.make])makeStats[s.make]={count:0,sale:0,profit:0};makeStats[s.make].count++;makeStats[s.make].sale+=s.sale||0;makeStats[s.make].profit+=s.profit||0;});
  const topMake=Object.entries(makeStats).sort((a,b)=>b[1].count-a[1].count)[0];
  const avgSale=sold.length?Math.round(sold.reduce((a,s)=>a+s.sale,0)/sold.length):0;
  const dtsAll=[];sold.forEach(s=>{const match=stock.find(c=>c.rego===s.rego||(c.make===s.make&&c.model===s.model&&c.year===s.year));if(match&&match.acq&&s.date){const d=Math.round((new Date(s.date)-new Date(match.acq))/86400000);if(d>0&&d<365)dtsAll.push({price:s.sale,days:d});}});
  const fastDTS=dtsAll.filter(d=>d.price<20000);const slowDTS=dtsAll.filter(d=>d.price>=20000);
  const avgFast=fastDTS.length?Math.round(fastDTS.reduce((a,d)=>a+d.days,0)/fastDTS.length):null;
  const avgSlow=slowDTS.length?Math.round(slowDTS.reduce((a,d)=>a+d.days,0)/slowDTS.length):null;
  const insights=[];
  if(topMake)insights.push({icon:"🏆",text:`Your last ${topMake[1].count} ${topMake[0]}s sold at avg ${fm(Math.round(topMake[1].sale/topMake[1].count))}`});
  if(avgFast&&avgSlow&&avgFast<avgSlow)insights.push({icon:"🚀",text:`Cars under $20k sell ${Math.round(((avgSlow-avgFast)/avgSlow)*100)}% faster (${avgFast}d vs ${avgSlow}d)`});
  if(sold.length)insights.push({icon:"💡",text:`Overall avg sale price: ${fm(avgSale)}`});
  return <div style={{background:C.s1,border:`1px solid rgba(124,111,255,.2)`,borderRadius:14,overflow:"hidden"}}>
    <div style={{background:"linear-gradient(135deg,rgba(124,111,255,.12),rgba(31,217,122,.06))",padding:"16px 20px",borderBottom:`1px solid rgba(124,111,255,.15)`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:40,height:40,borderRadius:10,background:"rgba(124,111,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📊</div>
        <div><div style={{fontWeight:800,fontSize:15}}>Market Intelligence</div><div style={{fontSize:11,color:C.t3,marginTop:1}}>Your private pricing and performance data</div></div>
      </div>
      <button onClick={open} style={{padding:"9px 18px",background:C.acc,border:"none",borderRadius:8,color:"white",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Open Full Report →</button>
    </div>
    <div style={{padding:"14px 18px"}}>
      {insights.length>0?<div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>
        {insights.map((ins,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",background:C.s2,borderRadius:9,border:`1px solid ${C.b1}`}}>
          <span style={{fontSize:16}}>{ins.icon}</span><span style={{fontSize:13,color:C.t1}}>{ins.text}</span>
        </div>)}
      </div>:<div style={{color:C.t3,fontSize:13,marginBottom:14,textAlign:"center",padding:"14px 0"}}>Add sales to see your market intelligence</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {[["Total Sold",sold.length,C.g],["In Stock",active.length,C.b],["Avg Sale",fm(avgSale),C.a]].map(([l,v,col])=><div key={l} style={{background:C.s2,borderRadius:9,padding:"10px 13px",textAlign:"center"}}>
          <div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>{l}</div>
          <div style={{fontSize:18,fontWeight:800,color:col}}>{v}</div>
        </div>)}
      </div>
    </div>
  </div>;
}

    <div style={{width:224,background:C.s1,borderRight:`1px solid ${C.b1}`,display:"flex",flexDirection:"column",flexShrink:0,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-40,left:-40,width:180,height:180,background:"radial-gradient(circle,rgba(124,111,255,.07) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>

      {/* Logo */}
      <div style={{padding:"14px 14px 11px",borderBottom:`1px solid ${C.b1}`,position:"relative",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
          <div style={{width:33,height:33,borderRadius:9,background:"linear-gradient(135deg,#7c6fff,#5b4ee0)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 4px 14px rgba(124,111,255,.45)"}}>
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.5" fill="white" opacity=".95"/><rect x="9" y="2" width="5" height="5" rx="1.5" fill="white" opacity=".45"/><rect x="2" y="9" width="5" height="5" rx="1.5" fill="white" opacity=".45"/><rect x="9" y="9" width="5" height="5" rx="1.5" fill="white" opacity=".95"/></svg>
          </div>
          <div>
            <div style={{fontSize:15,fontWeight:900,letterSpacing:-.8,lineHeight:1,color:C.t1}}>LMCT<span style={{color:C.acc}}>PRO</span></div>
            <div style={{fontSize:8,color:C.t4,marginTop:2,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1.5}}>{dp.dealerName||"Dealer Platform"}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 9px",background:"rgba(31,217,122,.06)",border:"1px solid rgba(31,217,122,.14)",borderRadius:20}}>
          <div style={{width:5,height:5,borderRadius:"50%",background:C.g,flexShrink:0,animation:"livePulse 2s infinite"}}/>
          <span style={{fontSize:9,color:C.g,fontWeight:700,letterSpacing:.5,fontFamily:"monospace"}}>AI ACTIVE</span>
          <span style={{fontSize:9,color:C.t4,marginLeft:"auto",fontFamily:"monospace"}}>{new Date().toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"})}</span>
        </div>
      </div>

      {/* Nav */}
      <nav style={{flex:1,padding:"6px 7px",display:"flex",flexDirection:"column",overflowY:"auto",position:"relative",zIndex:1}}>
        {NAVG.map(group=><div key={group.sec} style={{marginBottom:2}}>
          <div style={{display:"flex",alignItems:"center",gap:5,padding:"8px 8px 3px",marginBottom:1}}>
            {group.ai&&<div style={{width:4,height:4,borderRadius:"50%",background:C.acc,flexShrink:0}}/>}
            <span style={{fontSize:8.5,color:group.ai?C.acc2:C.t4,textTransform:"uppercase",letterSpacing:1.4,fontWeight:700}}>{group.sec}</span>
            {group.ai&&<div style={{flex:1,height:.5,background:"linear-gradient(90deg,rgba(124,111,255,.3),transparent)"}}/>}
          </div>
          {group.items.map(item=>{
            const isActive=page===item.id;
            return <button key={item.id} onClick={()=>sp(item.id)} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 9px",borderRadius:8,cursor:"pointer",width:"100%",textAlign:"left",border:"none",fontFamily:"inherit",marginBottom:1,transition:"all .13s",color:isActive?C.acc2:group.ai?"rgba(167,139,250,.65)":C.t2,fontSize:12,fontWeight:isActive?700:400,background:isActive?"rgba(124,111,255,.14)":"transparent",boxShadow:isActive?"inset 0 0 0 1px rgba(124,111,255,.22)":"none"}} onMouseEnter={e=>{if(!isActive){e.currentTarget.style.background="rgba(255,255,255,.04)";e.currentTarget.style.color=C.t1;}}} onMouseLeave={e=>{if(!isActive){e.currentTarget.style.background="transparent";e.currentTarget.style.color=group.ai?"rgba(167,139,250,.65)":C.t2;}}}>
              <span style={{fontSize:12,opacity:isActive?1:.65,flexShrink:0,width:15,textAlign:"center"}}>{item.icon}</span>
              <span style={{flex:1}}>{item.label}</span>
              {item.badge!=null&&<span style={{background:isActive?C.acc:item.bc?item.bc+"25":"rgba(255,255,255,.07)",color:isActive?"#fff":item.bc||C.t3,fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:7,minWidth:16,textAlign:"center",border:`1px solid ${isActive?C.acc:item.bc?item.bc+"30":C.b1}`}}>{item.badge}</span>}
              {item.sp&&<span style={{fontSize:10,opacity:.5}}>{ul?"🔓":"🔒"}</span>}
            </button>;
          })}
        </div>)}
      </nav>

      {/* Bottom */}
      <div style={{padding:"9px",borderTop:`1px solid ${C.b1}`,position:"relative",zIndex:1}}>
        <div onClick={ul?()=>{su(false);localStorage.setItem("lmct_ul","0");}:()=>req()} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:9,cursor:"pointer",marginBottom:7,transition:"all .2s",userSelect:"none",background:ul?"rgba(31,217,122,.07)":C.s2,border:`1px solid ${ul?"rgba(31,217,122,.18)":C.b1}`}}>
          <div style={{width:26,height:15,borderRadius:8,background:ul?C.g:"rgba(255,255,255,.08)",position:"relative",flexShrink:0,transition:"background .25s"}}>
            <div style={{width:11,height:11,borderRadius:"50%",background:"white",position:"absolute",top:2,left:ul?13:2,transition:"left .22s",boxShadow:"0 1px 3px rgba(0,0,0,.4)"}}/>
          </div>
          <div style={{flex:1}}><div style={{fontSize:10.5,fontWeight:700,color:ul?C.g:C.t2,lineHeight:1}}>{ul?"Manager Mode":"Staff View"}</div><div style={{fontSize:8.5,color:C.t4,marginTop:1}}>{ul?"All data visible":"Margins hidden"}</div></div>
          <span style={{fontSize:11}}>{ul?"🔓":"🔒"}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7,padding:"6px 8px",background:C.s2,borderRadius:7,border:`1px solid ${C.b1}`}}>
          <div style={{width:18,height:18,borderRadius:4,background:"linear-gradient(135deg,#7c6fff,#5b4ee0)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:8,color:"white",fontWeight:900}}>L</span></div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:10,fontWeight:600,color:C.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dp.dealerName||"MDMR Motors"}</div><div style={{fontSize:8,color:C.t4,fontFamily:"monospace"}}>LMCT {dp.lmct||"—"}</div></div>
        </div>
      </div>
    </div>

    {/* ══ MAIN CONTENT ══ */}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Premium header */}
      <div style={{height:50,background:C.s1,borderBottom:`1px solid ${C.b1}`,display:"flex",alignItems:"center",padding:"0 20px",gap:12,flexShrink:0}}>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:800,letterSpacing:-.3,color:C.t1}}>{PAGE_TITLES[page]||"LMCT PRO"}</div>
          <div style={{fontSize:9,color:C.t4,marginTop:1,fontFamily:"monospace"}}>{new Date().toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          {[{l:"Stock",v:active.length,c:C.b},{l:"Today",v:todaySales.length,c:C.g},{l:"Leads",v:cust.filter(c=>c.status==="Hot Lead").length,c:C.a}].map(({l,v,c})=><div key={l} style={{background:C.s2,border:`1px solid ${C.b1}`,borderRadius:7,padding:"4px 10px",textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
            <div style={{fontSize:8,color:C.t4,marginTop:1.5,fontFamily:"monospace"}}>{l}</div>
          </div>)}
          <button onClick={()=>sp("add")} style={{padding:"6px 13px",background:C.grad1,border:"none",borderRadius:8,color:"white",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 12px rgba(124,111,255,.3)",display:"flex",alignItems:"center",gap:5,transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-1px)";}} onMouseLeave={e=>{e.currentTarget.style.transform="";}}><span>+</span>Add Vehicle</button>
        </div>
      </div>

      {/* Page content */}
      <div style={{flex:1,overflow:"auto",padding:"18px 20px"}}>
        {page==="dashboard"&&<Dashboard stock={stock} sold={sold} cust={cust} setPage={sp} ul={ul} onReq={()=>req()} mp={gDM()}/>}
        {page==="stock"&&<Stock stock={stock} setStock={ss} onSell={c=>setSC(c)} setPage={sp} ul={ul} onReq={()=>req()}/>}
        {page==="add"&&<AddCar setStock={ss} setPage={sp}/>}
        {page==="sold"&&<Sold sold={sold} ul={ul} onReq={()=>req()}/>}
        {page==="cust"&&<Customers cust={cust} setCust={sc} sold={sold}/>}
        {page==="rego"&&<RegoSearch setStock={ss} setPage={sp}/>}
        {page==="listing"&&<div style={{maxWidth:600}}>
          <div style={{background:C.grad2,border:"1px solid rgba(124,111,255,.2)",borderRadius:16,padding:"28px 24px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-30,right:-30,width:150,height:150,background:"radial-gradient(circle,rgba(124,111,255,.1),transparent 70%)",pointerEvents:"none"}}/>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
              <div style={{width:48,height:48,borderRadius:12,background:C.accd,border:`1px solid ${C.accb}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>✍️</div>
              <div><div style={{fontSize:18,fontWeight:900,letterSpacing:-.4}}>Smart Listing Builder</div><div style={{fontSize:12,color:C.t3,marginTop:2}}>Rego to publish-ready in under 3 minutes</div></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:18}}>
              {[["📋","Auto-filled specs","Plate → full specs instantly"],["💰","Live market pricing","3 price bands from real data"],["✍️","AI-written copy","CarSales + Facebook + Gumtree"]].map(([ic,t,d])=><div key={t} style={{background:"rgba(0,0,0,.2)",borderRadius:9,padding:"12px 10px",border:`1px solid ${C.b1}`}}>
                <div style={{fontSize:18,marginBottom:6}}>{ic}</div>
                <div style={{fontSize:11,fontWeight:700,marginBottom:3}}>{t}</div>
                <div style={{fontSize:10,color:C.t3,lineHeight:1.45}}>{d}</div>
              </div>)}
            </div>
            <button onClick={()=>{try{const w=window.open("listing.html","_blank");if(!w)alert("Allow popups.");}catch(e){alert(e.message);}}} style={{width:"100%",padding:"13px",background:C.grad1,border:"none",borderRadius:9,color:"white",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 6px 20px rgba(124,111,255,.4)"}}>✍️  Start New Listing →</button>
          </div>
        </div>}
        {page==="cs"&&<CarSalesHub stock={stock}/>}
        {page==="vr"&&<VRForms stock={stock} sold={sold}/>}
        {page==="dealer"&&<DealerProfile/>}
        {page==="margin"&&<MarginProfile ul={ul} onReq={()=>req()}/>}
        {page==="data"&&<DataPage stock={stock} setStock={ss} sold={sold} setSold={sl} cust={cust} setCust={sc}/>}
        {page==="ai"&&<AIManager stock={stock} sold={sold}/>}
        {page==="intel"&&<MarketIntelligence stock={stock} sold={sold} ul={ul} onReq={()=>req()}/>}
        {page==="strategy"&&<div style={{background:C.s1,border:"1px solid rgba(124,111,255,.18)",borderRadius:14,overflow:"hidden"}}>
          <div style={{background:C.grad2,padding:"14px 18px",borderBottom:"1px solid rgba(124,111,255,.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:38,height:38,borderRadius:9,background:C.accd,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🧠</div><div><div style={{fontWeight:800,fontSize:14}}>Strategy Engine</div><div style={{fontSize:11,color:C.t3}}>AI buy/sell recommendations from your data</div></div></div>
            <button onClick={()=>{try{localStorage.setItem("lmct_stock",JSON.stringify(stock));localStorage.setItem("lmct_sold",JSON.stringify(sold));const w=window.open("strategy.html","_blank");if(!w)alert("Allow popups.");}catch(e){alert(e.message);}}} style={{padding:"8px 16px",background:C.acc,border:"none",borderRadius:7,color:"white",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Open Full Engine →</button>
          </div>
          <div style={{padding:"16px 18px",color:C.t3,fontSize:13,textAlign:"center"}}>Full AI strategy with buy/stop buying recommendations based on your sales history.</div>
        </div>}
      </div>
    </div>

    <Modal open={!!sellCar} onClose={()=>setSC(null)} title="Record Vehicle Sale" w={620}>{sellCar&&<SellModal car={sellCar} onConfirm={doSell} onClose={()=>setSC(null)}/>}</Modal>
    {emailStatus&&<div style={{position:"fixed",bottom:22,right:22,zIndex:800,background:emailStatus==="sending"?C.s3:emailStatus==="sent"?C.gd:C.rd,border:`1px solid ${emailStatus==="sending"?C.b2:emailStatus==="sent"?C.gb:C.rb}`,borderRadius:11,padding:"11px 16px",display:"flex",alignItems:"center",gap:9,fontSize:13,boxShadow:"0 16px 48px rgba(0,0,0,.5)",backdropFilter:"blur(10px)",animation:"fadeUp .3s ease"}}>
      <span style={{fontSize:16}}>{emailStatus==="sending"?"📨":emailStatus==="sent"?"✅":"⚠️"}</span>
      <div><div style={{fontWeight:700,color:emailStatus==="sent"?C.g:emailStatus==="failed"?C.r:C.t1}}>{emailStatus==="sending"?"Sending documents...":emailStatus==="sent"?"Documents sent to buyer":"Email failed — check settings"}</div>{emailStatus==="sent"&&<div style={{fontSize:10,color:C.t3,marginTop:1}}>Contract · Invoice · Compliance forms delivered</div>}</div>
    </div>}
  </div>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
