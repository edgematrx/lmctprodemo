<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>LMCT PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#080810;color:#eef}
#ld{position:fixed;inset:0;background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
#ld.gone{opacity:0;pointer-events:none}
.ll{font-size:30px;font-weight:900;color:#eef;letter-spacing:-1px;margin-bottom:6px}
.ll b{color:#7c6fff}
.ls{font-size:9px;color:#444;font-family:monospace;letter-spacing:3px;text-transform:uppercase;margin-bottom:28px}
.lbar{width:180px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.lfill{height:100%;width:0;background:linear-gradient(90deg,#7c6fff,#a89dff);border-radius:2px;transition:width .35s}
.ltxt{font-size:10px;color:#444;margin-top:10px;font-family:monospace}
.po{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.pb{background:#10101a;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:36px 32px;width:310px;text-align:center}
.pd{display:flex;justify-content:center;gap:12px;margin:18px 0}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.15);transition:all .18s}
.pdot.on{background:#7c6fff;border-color:#7c6fff;box-shadow:0 0 12px rgba(124,111,255,.5)}
.pdot.err{background:#f44;border-color:#f44;animation:shk .3s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.pk{padding:13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:10px;color:#eef;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.pk:hover{background:rgba(124,111,255,.2);border-color:#7c6fff}
.pk:active{transform:scale(.94)}
.pz{grid-column:2}.pdl{font-size:13px;color:#66a}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@media print{#root{overflow:visible!important} .noprint{display:none!important} body{background:white;color:#111}}
</style>
</head>
<body>
<div id="ld">

  <div class="ls">Dealer Platform</div>
  <div class="lbar"><div class="lfill" id="lf"></div></div>

const aiScore=(make,model,year,odo)=>{let s=65;if(["toyota","mazda","honda","hyundai"].includes((make||"").toLowerCase()))s+=10;if(["camry","cx-5","cr-v","ranger","rav4"].includes((model||"").toLowerCase()))s+=8;if(year>=2021)s+=10;else if(year>=2019)s+=5;if(odo<40000)s+=8;else if(odo>120000)s-=12;return Math.min(99,Math.max(25,s));};

          <div style={{width:34,height:34,borderRadius:8,background:C.s3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{ce(c.body)}</div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.year} {c.make} {c.model}</div><div style={{fontSize:11,color:C.t3}}>{c.rego} · {(c.odo||0).toLocaleString()}km</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:C.g}}>{fm(c.price)}</div>{ul?<div style={{fontSize:10,color:mg>0?C.g:C.r,fontWeight:600}}>{fm(mg)}</div>:<div style={{fontSize:10,color:C.t4}}>🔒</div>}</div>

function VRForms({stock,sold}){
  const dp=gDP();

    phone:"",email:"",mv:"",lowEm:false,pProd:false,
    rwcSer:"",rwcDate:"",rwcTes:"",delDate:new Date().toISOString().split("T")[0],
    wo:"no",ttype:"Dealer-to-Private",pay:"Cash"
  });
  const setF=k=>v=>setB(prev=>({...prev,[k]:v}));

  // Build combined vehicle list
  const allVehicles=[
    ...stock.map(c=>({...c,_type:"stock"})),
    ...sold.map(s=>({...s,id:"s"+s.id,make:s.make,model:s.model,year:s.year,body:s.body,rego:s.rego,vin:s.vin||"",odo:s.odo||0,colour:"",trans:"",fuel:"",engine:"",_type:"sold"}))
  ];
  const car=allVehicles.find(c=>String(c.id)===selId)||null;
  const sale=sold.find(s=>String(s.id)===salId)||null;

  useEffect(()=>{
    if(sale){

        sn:pts.slice(1).join(" "),gn:pts[0]||"",
        phone:sale.bPhone||"",email:sale.bEmail||"",
        addr:sale.bAddr||"",mv:String(sale.sale||""),
        delDate:sale.date||prev.delDate

    }
  },[salId]);

  const {duty,rate}=calcDuty(b.mv,b.lowEm,b.pProd);

          <FG label="Payment Method">

          <FG label="Buyer Address" full><Inp value={b.addr} onChange={setF("addr")} placeholder="123 St, Melbourne VIC 3000"/></FG>

          <FG label="Payment Method">

          </div>}
        </div>
      </div>}

      {/* INVOICE TAB */}
      {tab==="invoice"&&<div>
        <Divider label="Invoice Details"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
          <FG label="Buyer Full Name"><Inp value={(b.gn+" "+b.sn).trim()} onChange={v=>{const pts=v.split(" ");setB(prev=>({...prev,gn:pts[0]||"",sn:pts.slice(1).join(" ")}));}} placeholder="John Smith"/></FG>
          <FG label="Sale Price ($)"><Inp value={b.mv} onChange={setF("mv")} type="number" placeholder="22990"/></FG>
          <FG label="Buyer Address" full><Inp value={b.addr} onChange={setF("addr")} placeholder="123 St, Melbourne VIC 3000"/></FG>
          <FG label="Invoice Date"><Inp value={b.delDate} onChange={setF("delDate")} type="date"/></FG>

            <select style={{background:C.s3,border:`1px solid ${C.b2}`,borderRadius:7,padding:"8px 11px",color:C.t1,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%"}} value={b.pay} onChange={e=>setF("pay")(e.target.value)}>
              {["Cash","Bank Transfer","Finance","Cheque"].map(o=><option key={o} value={o}>{o}</option>)}
            </select>
          </FG>
        </div>
      </div>}

      {/* Generate button */}
      <div style={{display:"flex",gap:10,marginTop:16}}> 
        <Btn v="primary" onClick={()=>{
          if(!car){alert("Please select a vehicle first.");return;}
          if(!b.mv||parseFloat(b.mv)<=0){alert("Please enter the market value / sale price.");return;}
          try{
            localStorage.setItem("lmct_print_data",JSON.stringify({dp,car,sale,b,duty,tFee,totalPayable}));
            const win=window.open("forms.html","_blank");
            if(!win){alert("Please allow popups for this site to open documents.");}
            else{
              setTimeout(()=>{
                if(win.__renderDoc) win.__renderDoc(tab);
              },800);
            }
          }catch(e){alert("Error opening document: "+e.message);}
        }}>
          Open Document
        </Btn>
        <Btn v="ghost" onClick={()=>window.open("https://www.vicroads.vic.gov.au/registration/buy-sell-or-transfer-a-vehicle/transfer-fees-and-calculators","_blank")}>
          VicRoads Fee Calculator ↗
        </Btn>
      </div>
    </div>
  </div>;
}

function MarginProfile({ul,onReq}){
  const [m,sm]=useState(gDM),[saved,ss]=useState(false),[chg,sc]=useState(false),[np,snp]=useState(""),[cp,scp]=useState(""),[pe,spe]=useState("");
  const set=k=>v=>sm(p=>({...p,[k]:v}));

  return <div style={{maxWidth:680}}>

    <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,padding:20,marginBottom:14}}>
      <div style={{fontWeight:700,marginBottom:14}}>Margin Targets</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
        {[["warnMargin","Warning Below",C.r],["minMargin","Minimum Margin",C.a],["targetMargin","Target Margin",C.g]].map(([k,label,col])=><div key={k} style={{background:C.s2,borderRadius:10,padding:14,border:`1px solid ${C.b1}`}}><div style={{fontSize:11,fontWeight:700,color:col,textTransform:"uppercase",marginBottom:10}}>{label}</div><div style={{display:"flex",alignItems:"center",gap:6}}><input type="number" style={{background:C.s3,border:`1px solid ${C.b2}`,borderRadius:6,padding:"7px 10px",color:col,fontSize:20,fontWeight:700,fontFamily:"inherit",outline:"none",width:"65px"}} value={m[k]||0} onChange={e=>set(k)(parseInt(e.target.value)||0)} min={0} max={100}/><span style={{fontSize:18,color:C.t3,fontWeight:700}}>%</span></div></div>)}
      </div>
      <FG label="Manager Private Notes"><textarea style={{background:C.s3,border:`1px solid ${C.b2}`,borderRadius:7,padding:"9px 11px",color:C.t1,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%",resize:"vertical",minHeight:70}} value={m.notes||""} onChange={e=>set("notes")(e.target.value)} placeholder="Private manager notes — staff cannot see this..."/></FG>
      <Divider/>
      <div style={{display:"flex",gap:10,alignItems:"center"}}><Btn v="primary" onClick={save}>Save</Btn>{saved&&<span style={{fontSize:12,color:C.g,fontWeight:600}}>Saved</span>}</div>
    </div>
    <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,padding:20}}>
      <div style={{fontWeight:700,marginBottom:12}}>PIN Management</div>
      {!chg?<div style={{display:"flex",alignItems:"center",gap:12}}><div style={{background:C.s2,borderRadius:8,padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}><span>🔐</span><span style={{color:C.t3,fontSize:13}}>Current PIN:</span><span style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:C.acc2,letterSpacing:3}}>{m.pin}</span></div><Btn sz="sm" onClick={()=>sc(true)}>Change PIN</Btn></div>
      :<div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:11}}><FG label="New PIN (4 digits)"><Inp value={np} onChange={snp} type="password" placeholder="4 digits"/></FG><FG label="Confirm PIN"><Inp value={cp} onChange={scp} type="password" placeholder="Confirm"/></FG></div>{pe&&<div style={{fontSize:12,color:C.r,marginBottom:10}}>{pe}</div>}<div style={{display:"flex",gap:8}}><Btn onClick={()=>{sc(false);snp("");scp("");spe("");}}>Cancel</Btn><Btn v="primary" onClick={savePin}>Update PIN</Btn></div></div>}
      <div style={{marginTop:14,background:C.s2,borderRadius:9,padding:14,fontSize:12,color:C.t3}}>Protected: purchase price, recon costs, margins, profit on sales, total stock cost, potential profit.</div>
    </div>
  </div>;
}
// ── APP ──
function App(){
  const [stock,ss]=useState(SS),[sold,sl]=useState(SL),[cust,sc]=useState(CU);
  const [page,sp]=useState("dashboard"),[sellCar,setSC]=useState(null);
  const [ul,su]=useState(false),[showPin,ssp]=useState(false),[pinCB,spcb]=useState(null);
  useEffect(()=>{if(window.__done)setTimeout(window.__done,450);},[]);
  const mp=gDM();
  function req(cb){if(ul){if(cb)cb();return;}spcb(()=>cb||null);ssp(true);}
  function pinOK(){su(true);ssp(false);if(pinCB){pinCB();spcb(null);}}
  function doSell(form){
    sl(p=>[...p,{id:Date.now(),...form}]);
    ss(p=>p.map(c=>c.id===sellCar.id?{...c,status:"Sold"}:c));
    const name=form.buyer;
    if(name&&!cust.find(c=>c.phone===form.phone||`${c.first} ${c.last}`===name)){const pts=name.split(" ");sc(p=>[...p,{id:Date.now()+1,first:pts[0],last:pts.slice(1).join(" "),phone:form.phone||"",email:form.email||"",addr:form.addr||"",src:"Direct Sale",status:"Buyer",notes:`Bought ${sellCar.year} ${sellCar.make} ${sellCar.model}`,bought:1}]);}
    setSC(null);sp("sold");
  }
  const dp=gDP();
  const nav=[
    {id:"dashboard",label:"Dashboard",icon:"⊞",sec:"Main"},
    {id:"stock",label:"Stock",icon:"🚗",sec:"Inventory",badge:stock.filter(c=>c.status!=="Sold").length,bc:C.b},
    {id:"add",label:"Add Vehicle",icon:"+"},
    {id:"sold",label:"Sales",icon:"✅",badge:sold.length,bc:C.g},
    {id:"cust",label:"Customers",icon:"👥",sec:"CRM",badge:cust.length,bc:C.b},
    {id:"rego",label:"Rego Search",icon:"🔍",sec:"Tools"},
    {id:"cs",label:"CarSales Hub",icon:"🚘",cs:true},
    {id:"vr",label:"VicRoads / Forms",icon:"📋"},
    {id:"dealer",label:"Dealer Profile",icon:"🏢",sec:"Settings"},
    {id:"margin",label:"Margin Profile",icon:"🔐",special:true},
  ];
  const titles={dashboard:"Dashboard",stock:"Stock Inventory",add:"Add Vehicle",sold:"Sales History",cust:"Customers",rego:"Rego Lookup",cs:"CarSales Hub",vr:"VicRoads Forms",dealer:"Dealer Profile",margin:"Margin Profile"};
  return <div style={{display:"flex",height:"100vh",background:C.bg,color:C.t1,fontSize:14,overflow:"hidden"}}>
    {showPin&&<PINModal onSuccess={pinOK} onClose={()=>ssp(false)}/>}
    {/* SIDEBAR */}
    <div style={{width:218,background:C.s1,borderRight:`1px solid ${C.b1}`,display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"18px 16px 14px",borderBottom:`1px solid ${C.b1}`}}><div style={{fontSize:20,fontWeight:900,letterSpacing:-.8}}>LMCT<span style={{color:C.acc}}>PRO</span></div><div style={{fontSize:9,color:C.t4,marginTop:3,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:2}}>Dealer Platform</div></div>
      <nav style={{flex:1,padding:"9px 7px",display:"flex",flexDirection:"column",gap:1,overflowY:"auto"}}>
        {nav.map(item=>{const active=page===item.id,sp2=item.special,isCS=item.cs;return <div key={item.id}>
          {item.sec&&<div style={{fontSize:9,color:C.t4,textTransform:"uppercase",letterSpacing:1.2,padding:"10px 10px 3px",fontWeight:700}}>{item.sec}</div>}
          <button onClick={()=>sp(item.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 9px",borderRadius:7,cursor:"pointer",color:isCS?"#ff6600":sp2?(ul?C.g:C.a):active?C.acc2:C.t2,fontSize:13,fontWeight:active||sp2||isCS?700:400,background:active?"rgba(124,111,255,.12)":isCS?"rgba(255,102,0,.06)":sp2?"rgba(245,166,35,.06)":"transparent",border:"none",width:"100%",textAlign:"left",transition:"all .15s",marginBottom:1}}>
            <span style={{fontSize:15}}>{item.icon}</span><span style={{flex:1}}>{item.label}</span>
            {item.badge!=null&&<span style={{background:item.bc||C.acc,color:"#fff",fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10,minWidth:20,textAlign:"center"}}>{item.badge}</span>}
            {sp2&&<span style={{fontSize:10}}>{ul?"🔓":"🔒"}</span>}
          </button>
        </div>;})}
      </nav>
      <div style={{padding:"9px 11px",borderTop:`1px solid ${C.b1}`}}>
        <div onClick={ul?()=>su(false):()=>req()} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,cursor:"pointer",background:ul?"rgba(31,217,122,.06)":C.s2,border:`1px solid ${ul?"rgba(31,217,122,.18)":C.b1}`,marginBottom:9,transition:"all .2s",userSelect:"none"}}>
          <span style={{fontSize:14}}>{ul?"🔓":"🔒"}</span>
          <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:ul?C.g:C.t2}}>{ul?"Manager Mode":"Staff View"}</div><div style={{fontSize:10,color:C.t4,marginTop:1}}>{ul?"Click to lock":"Click to unlock"}</div></div>
        </div>
        <div style={{background:C.s2,borderRadius:8,padding:"9px 12px"}}><div style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dp.dealerName}</div><div style={{fontSize:10,color:C.acc2,fontFamily:"monospace",marginTop:2}}>LMCT #{dp.lmct}</div></div>
        <a href="index.html" style={{display:"flex",alignItems:"center",gap:5,padding:"7px 3px",marginTop:7,fontSize:11,color:C.t4,textDecoration:"none"}}>Back to website</a>
      </div>
    </div>
    {/* MAIN */}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{height:54,borderBottom:`1px solid ${C.b1}`,display:"flex",alignItems:"center",padding:"0 20px",gap:11,flexShrink:0,background:C.s1}}>
        <div style={{flex:1,fontSize:16,fontWeight:800,letterSpacing:-.3}}>{titles[page]||page}</div>
        {!ul&&<div onClick={()=>req()} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:7,background:C.s2,border:`1px solid ${C.b2}`,cursor:"pointer",fontSize:12,color:C.t3}}>🔒 Margins hidden</div>}
        {ul&&<Badge color="green" dot>Manager View</Badge>}
        <Clock/>
        <Btn sz="sm" onClick={()=>sp("rego")}>Rego</Btn>
        <Btn v="primary" sz="sm" onClick={()=>sp("add")}>+ Add Vehicle</Btn>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:20}}>
        {page==="dashboard"&&<Dashboard stock={stock} sold={sold} cust={cust} setPage={sp} ul={ul} onReq={()=>req()} mp={mp}/>}
        {page==="stock"&&<Stock stock={stock} setStock={ss} onSell={c=>setSC(c)} setPage={sp} ul={ul} onReq={()=>req()}/>}
        {page==="add"&&<AddCar setStock={ss} setPage={sp}/>}
        {page==="sold"&&<Sold sold={sold} ul={ul} onReq={()=>req()}/>}
        {page==="cust"&&<Customers cust={cust} setCust={sc} sold={sold}/>}
        {page==="rego"&&<RegoSearch setStock={ss} setPage={sp}/>}
        {page==="cs"&&<CarSalesHub stock={stock}/>}
        {page==="vr"&&<VRForms stock={stock} sold={sold}/>}
        {page==="dealer"&&<DealerProfile/>}
        {page==="margin"&&<MarginProfile ul={ul} onReq={()=>req()}/>}
      </div>
    </div>
    <Modal open={!!sellCar} onClose={()=>setSC(null)} title="Record Vehicle Sale" w={620}>{sellCar&&<SellModal car={sellCar} onConfirm={doSell} onClose={()=>setSC(null)}/>}</Modal>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
