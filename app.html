<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMCT PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui,sans-serif;background:#0a0a12;color:#f1f0ff;-webkit-font-smoothing:antialiased}

/* ── ANIMATIONS ── */
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.5)}70%{opacity:.8;box-shadow:0 0 0 6px rgba(16,185,129,0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(139,92,246,.15)}50%{box-shadow:0 0 50px rgba(139,92,246,.35)}}
@keyframes shimmerLoad{0%{background-position:0%}100%{background-position:200%}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes floatIn{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ── LOADING SCREEN ── */
#ld{position:fixed;inset:0;background:linear-gradient(135deg,#0a0a12 0%,#120a1e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .7s ease}
#ld.gone{opacity:0;pointer-events:none}
.ll{font-size:30px;font-weight:900;color:#f1f0ff;letter-spacing:-1.5px;margin-bottom:4px}
.ll b{color:#f59e0b}
.ls{font-size:8px;color:#38355a;font-family:monospace;letter-spacing:4px;text-transform:uppercase;margin-bottom:36px}
.lbar{width:220px;height:2px;background:rgba(139,92,246,.12);border-radius:2px;overflow:hidden}
.lfill{height:100%;width:0;background:linear-gradient(90deg,#8b5cf6,#a78bfa,#6d28d9);background-size:200%;animation:shimmerLoad 1.8s infinite;border-radius:2px;transition:width .3s}
.ltxt{font-size:10px;color:#5e5a8a;margin-top:14px;font-family:monospace;letter-spacing:.5px}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;
  background:linear-gradient(160deg,#1e1540 0%,#150f2e 40%,#0e0a1e 100%);
  border-right:1px solid rgba(139,92,246,.25);
  display:flex;flex-direction:column;height:100%;overflow-y:auto;flex-shrink:0;
  position:relative;
  box-shadow:4px 0 24px rgba(0,0,0,.4),inset -1px 0 0 rgba(139,92,246,.10);
}
.sidebar::before{
  content:"";position:absolute;top:0;left:0;right:0;height:300px;
  background:radial-gradient(ellipse at 40% -10%,rgba(139,92,246,.25) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}
.sidebar::after{
  content:"";position:absolute;bottom:0;left:0;right:0;height:180px;
  background:radial-gradient(ellipse at 60% 120%,rgba(109,40,217,.15) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
.nav-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:#6b6890;padding:16px 18px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px 9px 16px;margin:1px 8px;border-radius:10px;cursor:pointer;transition:all .18s;font-size:13px;font-weight:500;color:#bbb8d8;position:relative;border:1px solid transparent;background:transparent;width:calc(100% - 16px);text-align:left;font-family:inherit}
.nav-item:hover{background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(139,92,246,.08));color:#f1f0ff;border-color:rgba(139,92,246,.25);transform:translateX(2px);box-shadow:0 2px 12px rgba(139,92,246,.12),inset 0 1px 0 rgba(255,255,255,.04)}
.nav-item.active{background:linear-gradient(135deg,rgba(139,92,246,.35),rgba(109,40,217,.20));color:#f1f0ff;font-weight:700;border-color:rgba(139,92,246,.50);box-shadow:0 4px 20px rgba(139,92,246,.25),inset 0 1px 0 rgba(255,255,255,.10),inset 0 -1px 0 rgba(0,0,0,.15)}
.nav-item.active::before{content:"";position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:22px;background:linear-gradient(180deg,#e9d5ff,#8b5cf6,#6d28d9);border-radius:2px;box-shadow:0 0 10px rgba(139,92,246,.8),0 0 20px rgba(139,92,246,.4)}
.nav-item::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 50%);pointer-events:none;opacity:0;transition:opacity .18s}
.nav-item:hover::after{opacity:1}
.nav-badge{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:800;margin-left:auto;line-height:1.4}
.nav-premium-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,.2),transparent);margin:8px 16px 4px}

/* ── TOPBAR ── */
.topbar{
  height:56px;
  background:linear-gradient(135deg,rgba(20,16,38,.98) 0%,rgba(14,12,26,.98) 100%);
  border-bottom:1px solid rgba(139,92,246,.18);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;
  box-shadow:0 2px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04),inset 0 -1px 0 rgba(139,92,246,.08);
}

/* ── TOPBAR STATS ── */
.tb-stat{display:flex;flex-direction:column;align-items:center;padding:4px 12px;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent;min-width:48px}
.tb-stat:hover{background:rgba(139,92,246,.10);border-color:rgba(139,92,246,.20)}
.tb-stat-val{font-size:16px;font-weight:900;line-height:1;letter-spacing:-.5px}
.tb-stat-lbl{font-size:9px;color:#5e5a8a;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-top:1px}

/* ── CARDS ── */
.card{
  background:linear-gradient(145deg,rgba(32,26,58,.95) 0%,rgba(22,18,42,.98) 100%);
  border:1px solid rgba(139,92,246,.15);
  border-radius:16px;
  transition:all .25s cubic-bezier(.2,.8,.3,1);
  position:relative;overflow:hidden;
  animation:floatIn .4s ease backwards;
  box-shadow:0 4px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05),inset 0 -1px 0 rgba(0,0,0,.2);
}
.card:hover{border-color:rgba(139,92,246,.35);box-shadow:0 12px 40px rgba(139,92,246,.15),0 4px 16px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);transform:translateY(-2px)}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);pointer-events:none}
.card::after{content:"";position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.03) 0%,transparent 40%);pointer-events:none;border-radius:inherit}

/* ── STAT CARDS ── */
.stat-card:hover{transform:translateY(-4px) scale(1.01)!important;box-shadow:0 16px 48px rgba(139,92,246,.20),0 6px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08)!important}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.15);border-radius:4px}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,rgba(139,92,246,.4),rgba(109,40,217,.3));border-radius:4px;box-shadow:inset 0 0 4px rgba(139,92,246,.2)}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,rgba(139,92,246,.6),rgba(109,40,217,.5))}

/* ── BUTTONS ── */
button:focus-visible{outline:2px solid rgba(139,92,246,.6);outline-offset:2px}
.btn-3d{box-shadow:0 4px 0 rgba(0,0,0,.3),0 6px 16px rgba(0,0,0,.2);transform:translateY(0);transition:all .12s}
.btn-3d:hover{box-shadow:0 6px 0 rgba(0,0,0,.3),0 8px 20px rgba(0,0,0,.25);transform:translateY(-2px)}
.btn-3d:active{box-shadow:0 1px 0 rgba(0,0,0,.3);transform:translateY(3px)}

/* ── INPUTS ── */
input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 2px rgba(139,92,246,.35)}

/* ── PIN MODAL ── */
.po{position:fixed;inset:0;background:rgba(5,5,15,.92);z-index:600;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(20px)}
.pb{background:linear-gradient(145deg,rgba(28,20,52,.97),rgba(16,12,32,.99));border:1px solid rgba(139,92,246,.30);border-radius:24px;padding:40px 36px;width:320px;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.9),0 0 60px rgba(139,92,246,.1),inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.3)}
.pd{display:flex;justify-content:center;gap:14px;margin:20px 0}
.pdot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(139,92,246,.25);transition:all .2s}
.pdot.on{background:#8b5cf6;border-color:#8b5cf6;box-shadow:0 0 16px rgba(139,92,246,.7)}
.pdot.err{background:#ef4444;border-color:#ef4444;animation:shk .3s}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.pk{padding:15px;background:rgba(255,255,255,.04);border:1px solid rgba(139,92,246,.15);border-radius:12px;color:#f1f0ff;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.pk:hover{background:rgba(139,92,246,.20);border-color:rgba(139,92,246,.45);transform:translateY(-1px);box-shadow:0 4px 12px rgba(139,92,246,.2)}
.pk:active{transform:translateY(0)}
.pdl{margin-top:14px;cursor:pointer;color:#5e5a8a;font-size:11px;transition:color .15s}
.pdl:hover{color:#9b96c4}
.pz{grid-column:2}

/* ── AI BADGE ── */
.ai-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.25);letter-spacing:.5px;text-transform:uppercase}

/* ── ALERTS ── */
.alert-row{animation:floatIn .3s ease backwards;border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:13px}

/* ── TABLES / LISTS ── */
.list-row{padding:10px 0;border-bottom:1px solid rgba(139,92,246,.08);transition:background .15s}
.list-row:hover{background:rgba(139,92,246,.05);margin:0 -8px;padding:10px 8px;border-radius:8px}
.list-row:last-child{border-bottom:none}
</style>

<script>
// ── SOUND SYSTEM ──
window.SFX={
  _ctx:null,
  _get(){if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();return this._ctx;},
  play(type){
    try{
      const ctx=this._get();
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      const now=ctx.currentTime;
      if(type==='sell'){
        // Success chime — ascending tones
        o.type='sine';
        o.frequency.setValueAtTime(440,now);
        o.frequency.exponentialRampToValueAtTime(660,now+0.1);
        o.frequency.exponentialRampToValueAtTime(880,now+0.2);
        g.gain.setValueAtTime(0.3,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
        o.start(now);o.stop(now+0.5);
      } else if(type==='click'){
        o.type='sine';o.frequency.setValueAtTime(600,now);
        g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
        o.start(now);o.stop(now+0.08);
      } else if(type==='save'){
        o.type='sine';
        o.frequency.setValueAtTime(523,now);
        o.frequency.setValueAtTime(659,now+0.1);
        g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
        o.start(now);o.stop(now+0.35);
      } else if(type==='alert'){
        o.type='square';o.frequency.setValueAtTime(220,now);
        g.gain.setValueAtTime(0.1,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
        o.start(now);o.stop(now+0.3);
      } else if(type==='nav'){
        o.type='sine';o.frequency.setValueAtTime(880,now);
        g.gain.setValueAtTime(0.08,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
        o.start(now);o.stop(now+0.06);
      }
    }catch(e){}
  }
};
var p=0,mi=0,msgs=["Initialising platform...","Loading stock data...","Preparing dashboard...","Almost ready..."];
var iv=setInterval(function(){p+=Math.random()*15+5;if(p>92)p=92;document.getElementById("lf").style.width=p+"%";document.getElementById("lt").textContent=msgs[Math.min(mi++,3)];},300);
window.__done=function(){clearInterval(iv);document.getElementById("lf").style.width="100%";setTimeout(function(){document.getElementById("ld").classList.add("gone");},350);};
</script>

function TodaysTasks({stock,cust,setPage,ul}){
  var TODAY=new Date().toISOString().split("T")[0];
  var SK="lmct_tasks_"+TODAY;
  function load(){try{return JSON.parse(localStorage.getItem(SK)||"[]");}catch(e){return [];}}
  var [tasks,setTasks]=useState(function(){return load();});
  var [newTask,setNewTask]=useState("");
  function save(t){setTasks(t);localStorage.setItem(SK,JSON.stringify(t));}
  function add(){if(!newTask.trim())return;save(tasks.concat([{id:Date.now(),text:newTask.trim(),done:false}]));setNewTask("");}
  function toggle(id){save(tasks.map(function(t){return t.id===id?Object.assign({},t,{done:!t.done}):t;}));}

function DonutChart({segments,size,thick,label,sub}){
  size=size||120;thick=thick||16;
  var r=(size-thick)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  var total=segments.reduce(function(a,s){return a+s.v;},0)||1;
  var offset=0;
  var slices=segments.map(function(s){var pct=s.v/total;var dash=pct*circ;var gap=circ-dash;var sl=Object.assign({},s,{dash:dash,gap:gap,offset:offset});offset+=dash;return sl;});
  return <svg width={size} height={size} viewBox={"0 0 "+size+" "+size} style={{transform:"rotate(-90deg)"}}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth={thick}/>
    {slices.map(function(s,i){return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={thick} strokeDasharray={s.dash+" "+s.gap} strokeDashoffset={-s.offset} strokeLinecap="round"/>;  })}
    <text x={cx} y={cy-5} textAnchor="middle" fill="white" fontSize={size/6} fontWeight="900" style={{transform:"rotate(90deg)",transformOrigin:cx+"px "+cy+"px"}}>{label}</text>
    <text x={cx} y={cy+10} textAnchor="middle" fill="rgba(255,255,255,.4)" fontSize={size/10} style={{transform:"rotate(90deg)",transformOrigin:cx+"px "+cy+"px"}}>{sub}</text>
  </svg>;
}

function BarChart({data,h}){
  h=h||80;
  if(!data||!data.length)return <div style={{height:h,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,.2)",fontSize:12}}>No data yet</div>;
  var max=Math.max.apply(null,data.map(function(d){return d.v;}));max=max||1;
  var w=100/data.length;
  return <svg width="100%" height={h} viewBox={"0 0 100 "+h} preserveAspectRatio="none">
    {data.map(function(d,i){var barH=Math.max((d.v/max)*(h-14),1);var x=i*w+w*.15;var bw=w*.7;var y=h-barH-12;return <g key={i}><rect x={x} y={h-12-barH} width={bw} height={barH} rx={1.5} fill={d.color||"rgba(139,92,246,.6)"} opacity=".9"/><text x={x+bw/2} y={h-2} textAnchor="middle" fill="rgba(255,255,255,.35)" fontSize={6}>{d.label}</text>{d.v>0&&<text x={x+bw/2} y={y-2} textAnchor="middle" fill={d.color||"rgba(255,255,255,.7)"} fontSize={6} fontWeight="700">{d.v}</text>}</g>;})}
  </svg>;
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  componentDidCatch(error,info){if(window.__done)window.__done();this.setState({error:error.message+"\n"+error.stack});}
  static getDerivedStateFromError(error){return {error:error.message+"\n"+error.stack};}
  render(){if(this.state.error){return <div style={{color:"#ef4444",background:"#0a0a12",padding:30,fontFamily:"monospace",fontSize:12,minHeight:"100vh"}}><h2>Error</h2><pre style={{color:"#f59e0b",whiteSpace:"pre-wrap",marginTop:10}}>{this.state.error}</pre></div>;}return this.props.children;}
}
