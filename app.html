function DataPage({stock,sold,cust,setStock,setSold}){
  function toCSV(rows,headers){
    const esc=v=>{const s=v===null||v===undefined?"":String(v);return s.includes(",")||s.includes("\n")||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;};
    return [headers.join(","),...rows.map(r=>headers.map(h=>esc(r[h])).join(","))].join("\n");
  }
  function dl(csv,name){const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
  const dp=gDP();
  function exportAll(){
    let out="LMCT PRO Export\n";
    out+=`${dp.dealerName} | LMCT ${dp.lmct} | ${new Date().toLocaleString("en-AU")}\n\n`;
    out+="=== STOCK ===\n";
    out+=toCSV(stock,["id","make","model","year","colour","body","trans","fuel","odo","engine","drive","rego","vin","purchase","price","recon","other","source","acq","ppsr","regoExp","seller","sellerAddr","notes","status","score"])+"\n\n";

    out+=toCSV(sold,["id","make","model","year","body","rego","vin","sale","cost","recon","profit","buyer","bPhone","bEmail","bAddr","date","pay"])+"\n\n";
    out+="=== CUSTOMERS ===\n";
    out+=toCSV(cust,["id","first","last","phone","email","addr","src","status","notes","bought"]);
    dl(out,`lmctpro_backup_${new Date().toISOString().split("T")[0]}.csv`);
  }
  function openImport(){
    try{
      localStorage.setItem("lmct_import_callback","1");
      const w=window.open("data.html","_blank");

        <div style={{fontSize:12,color:C.t3,marginBottom:14,lineHeight:1.6}}>Upload a CSV from EasyCars,<br/>DealerSocket, Excel or any DMS</div>
        <button onClick={openImport} style={{width:"100%",padding:"11px",background:C.gd,border:`1px solid ${C.gb}`,borderRadius:8,color:C.g,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Open Import Tool</button>
      </div>
    </div>
    <div style={{background:C.s2,borderRadius:9,padding:"11px 14px",fontSize:12,color:C.t3,border:`1px solid ${C.b1}`}}>
      💡 Export regularly as a backup. The import tool opens in a new tab where you can upload and preview your EasyCars CSV before importing.
    </div>
  </div>;
}

// ── AI MANAGER ──
function AIManager({stock,sold}){
  const [resp,setResp]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const [expanded,setExpanded]=useState(false);

  // Build real dealer analytics from actual data
  function buildAnalytics(){
    const active=stock.filter(c=>c.status!=="Sold");
    const now=new Date();

    // Days to sell per sold vehicle
    const dts=sold.map(s=>{
      const match=stock.find(c=>c.rego===s.rego||c.make===s.make&&c.model===s.model&&c.year===s.year);
      if(match&&match.acq&&s.date){
        const days=Math.round((new Date(s.date)-new Date(match.acq))/86400000);
        return days>0&&days<365?days:null;
      }
      return null;
    }).filter(Boolean);
    const avgDTS=dts.length?Math.round(dts.reduce((a,b)=>a+b,0)/dts.length):null;

    // Source breakdown
    const sources={};
    sold.forEach(s=>{
      const match=stock.find(c=>c.rego===s.rego);
      const src=match?.source||"Unknown";
      if(!sources[src])sources[src]={count:0,profit:0};
      sources[src].count++;
      sources[src].profit+=s.profit||0;
    });

    // Ageing stock
    const aged=active.filter(c=>dAgo(c.acq)>60).map(c=>({
      vehicle:`${c.year} ${c.make} ${c.model}`,
      days:dAgo(c.acq),
      price:c.price,
      score:c.score
    }));

    // Margin analysis
    const margins=sold.map(s=>s.profit&&s.sale?((s.profit/s.sale)*100).toFixed(1):null).filter(Boolean).map(Number);
    const avgMargin=margins.length?(margins.reduce((a,b)=>a+b,0)/margins.length).toFixed(1):null;

    // Best/worst sellers by make
    const makeStats={};
    sold.forEach(s=>{
      if(!makeStats[s.make])makeStats[s.make]={count:0,profit:0,revenue:0};
      makeStats[s.make].count++;
      makeStats[s.make].profit+=s.profit||0;
      makeStats[s.make].revenue+=s.sale||0;
    });

    // Rego expiry risks
    const regoRisk=active.filter(c=>c.regoExp&&dUntil(c.regoExp)<30).map(c=>({
      vehicle:`${c.year} ${c.make} ${c.model}`,
      rego:c.rego,
      days:dUntil(c.regoExp)
    }));

    // Monthly revenue trend
    const monthly={};
    sold.forEach(s=>{
      if(!s.date)return;
      const key=s.date.substring(0,7);
      if(!monthly[key])monthly[key]={revenue:0,profit:0,count:0};
      monthly[key].revenue+=s.sale||0;
      monthly[key].profit+=s.profit||0;
      monthly[key].count++;
    });

    return {
      totalStock:active.length,
      totalSold:sold.length,
      avgDaysToSell:avgDTS,
      allDaysToSell:dts,
      agedStock:aged,
      sourceBreakdown:sources,
      avgMarginPct:avgMargin,
      makeStats,
      regoRisk,
      monthlyTrend:monthly,
      totalRevenue:sold.reduce((a,s)=>a+s.sale,0),
      totalProfit:sold.reduce((a,s)=>a+(s.profit||0),0),
      stockValue:active.reduce((a,c)=>a+c.price,0),
      stockCost:active.reduce((a,c)=>a+c.purchase+c.recon+(c.other||0),0),
    };
  }

      <div style={{display:"flex",background:C.s2,border:`1px solid ${C.b1}`,borderRadius:7,overflow:"hidden"}}>{[["grid","⊞"],["list","☰"]].map(([v,ic])=><button key={v} onClick={()=>setVw(v)} style={{padding:"7px 10px",border:"none",background:vw===v?C.s4:"transparent",color:vw===v?C.t1:C.t3,cursor:"pointer"}}>{ic}</button>)}</div>

        return <div key={c.id} onClick={()=>setDet(c)} style={{background:C.s1,border:`1px solid ${exp?C.rb:C.b1}`,borderRadius:12,overflow:"hidden",cursor:"pointer",transition:"all .18s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=C.b3;e.currentTarget.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=exp?C.rb:C.b1;e.currentTarget.style.transform="";}}>

      {items.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:60,color:C.t3}}><div style={{fontSize:40,marginBottom:10}}>🚗</div>No vehicles found</div>}

          <td style={{padding:"10px 12px",borderBottom:`1px solid ${C.b1}`}}><div style={{fontWeight:600,fontSize:13}}>{c.year} {c.make} {c.model}</div><div style={{fontSize:11,color:C.t3}}>{c.colour}</div></td>
          <td style={{padding:"10px 12px",borderBottom:`1px solid ${C.b1}`,fontFamily:"monospace",fontSize:12,color:C.t2}}>{c.rego}</td>

          <td style={{padding:"10px 12px",borderBottom:`1px solid ${C.b1}`}}><span style={{fontSize:12,color:dAgo(c.acq)>60?C.r:dAgo(c.acq)>30?C.a:C.t3}}>{dAgo(c.acq)}d</span></td>

          <td style={{padding:"10px 12px",borderBottom:`1px solid ${C.b1}`}}><span style={{fontSize:11,fontWeight:700,padding:"2px 7px",borderRadius:4,background:scb(c.score),color:sc(c.score)}}>AI {c.score}</span></td>
          <td style={{padding:"10px 12px",borderBottom:`1px solid ${C.b1}`}}><Badge color={c.status==="Reserved"?"amber":"green"} dot>{c.status}</Badge></td>
          <td style={{padding:"10px 12px",borderBottom:`1px solid ${C.b1}`}}><Btn sz="xs" onClick={e=>{e.stopPropagation();setDet(c);}}>View</Btn></td>
        </tr>;})}
        </tbody>
      </table>
    </div>}
    <Modal open={!!det} onClose={()=>setDet(null)} title={det?`${det.year} ${det.make} ${det.model}`:""} w={700}>{det&&<StockDetail car={det} onSell={()=>{onSell(det);setDet(null);}} onDelete={()=>{setStock(p=>p.filter(x=>x.id!==det.id));setDet(null);}} onStatus={s=>setStock(p=>p.map(c=>c.id===det.id?{...c,status:s}:c))} ul={ul} onReq={onReq}/>}</Modal>
  </div>;
}

        <div style={{background:C.s2,borderRadius:10,padding:14,marginTop:12,border:`1px solid ${C.b2}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

            {!ul?<div onClick={onReq} style={{fontSize:11,color:C.acc2,cursor:"pointer"}}>🔒 Enter PIN</div>:<Badge color="green">🔓 Unlocked</Badge>}

function AddCar({setStock,setPage}){
  const blank={make:"",model:"",year:"",colour:"",body:"",trans:"",fuel:"",odo:"",engine:"",drive:"",rego:"",vin:"",purchase:"",price:"",recon:"",other:"",source:"",acq:new Date().toISOString().split("T")[0],ppsr:"Clear",regoExp:"",seller:"",sellerAddr:"",notes:""};
  const [f,sf]=useState(blank);
  const [regoQ,setRegoQ]=useState("");
  const [regoLoading,setRegoLoading]=useState(false);
  const [regoFound,setRegoFound]=useState(null); // null | "found" | "nf"
  const [aiScore2,setAiScore2]=useState(null);

  const set=k=>v=>{
    sf(p=>{
      const next={...p,[k]:v};
      const s=aiScore(next.make,next.model,parseInt(next.year),parseInt(next.odo)||50000);
      setAiScore2(s);
      if(!next.price&&next.make&&next.year){next.price=String(suggestP(next.make,next.model,parseInt(next.year),parseInt(next.odo)||50000));}
      return next;
    });
  };

  // AutoGrab-style rego lookup (simulated — replace with real API key)
  function lookupRego(){
    const plate=regoQ.trim().toUpperCase();
    if(!plate){alert("Enter a plate number.");return;}
    setRegoLoading(true);setRegoFound(null);
    // Simulate API — in production swap for AutoGrab: https://api.autograb.com.au
    const DB={
      "ABC123":{make:"Toyota",model:"Camry",year:2019,colour:"Silver",body:"Sedan",trans:"Automatic",fuel:"Petrol",engine:"2.5L 4-cyl",drive:"FWD",vin:"JTNBE46KX73065432",regoExp:"2026-08-01"},
      "XYZ123":{make:"Toyota",model:"Camry",year:2019,colour:"Silver",body:"Sedan",trans:"Automatic",fuel:"Petrol",engine:"2.5L 4-cyl",drive:"FWD",vin:"JTNBE46KX73065432",regoExp:"2026-08-01"},
      "ABC456":{make:"Mazda",model:"CX-5",year:2020,colour:"Red",body:"SUV",trans:"Automatic",fuel:"Petrol",engine:"2.5L 4-cyl",drive:"AWD",vin:"JM3KFBCM0L0123456",regoExp:"2026-10-15"},
      "LMN789":{make:"Ford",model:"Ranger",year:2018,colour:"White",body:"Ute",trans:"Automatic",fuel:"Diesel",engine:"3.2L Turbo",drive:"4WD",vin:"6FPAAAJJXJR000120",regoExp:"2025-06-20"},
      "DEF321":{make:"Honda",model:"CR-V",year:2021,colour:"Blue",body:"SUV",trans:"CVT",fuel:"Petrol",engine:"1.5T",drive:"AWD",vin:"7FARW2H55ME000890",regoExp:"2026-01-20"},
    };
    setTimeout(()=>{
      setRegoLoading(false);
      const data=DB[plate];
      if(data){
        const score=aiScore(data.make,data.model,data.year,50000);
        const sugPrice=suggestP(data.make,data.model,data.year,50000);
        sf(prev=>({...prev,...data,rego:plate,price:prev.price||String(sugPrice)}));
        setAiScore2(score);
        setRegoFound("found");
      } else {
        // Any unknown plate — generate plausible vehicle
        const makes=[{make:"Toyota",model:"Corolla",year:2018,colour:"White",body:"Sedan",trans:"Automatic",fuel:"Petrol",engine:"2.0L",drive:"FWD"},{make:"Hyundai",model:"i30",year:2019,colour:"Grey",body:"Hatchback",trans:"Automatic",fuel:"Petrol",engine:"2.0L",drive:"FWD"},{make:"Mitsubishi",model:"ASX",year:2020,colour:"Silver",body:"SUV",trans:"CVT",fuel:"Petrol",engine:"2.0L",drive:"FWD"}];
        const v=makes[plate.charCodeAt(0)%makes.length];
        const d={...v,vin:"JN1"+plate+Date.now().toString().slice(-6),regoExp:"2026-"+String(Math.floor(Math.random()*12)+1).padStart(2,"0")+"-01"};
        const score=aiScore(d.make,d.model,d.year,50000);
        sf(prev=>({...prev,...d,rego:plate,price:prev.price||String(suggestP(d.make,d.model,d.year,50000))}));
        setAiScore2(score);
        setRegoFound("found");
      }
    },1100);
  }

  const pur=parseFloat(f.purchase)||0,pri=parseFloat(f.price)||0,rec=parseFloat(f.recon)||0,oth=parseFloat(f.other)||0,tot=pur+rec+oth,mg=pri-tot;

  function save(){
    if(!f.make||!f.model||!f.year){alert("Make, Model and Year required.");return;}
    setStock(p=>[...p,{...f,id:Date.now(),year:parseInt(f.year),odo:parseInt(f.odo)||0,purchase:pur,price:pri,recon:rec,other:oth,status:"Available",score:aiScore(f.make,f.model,parseInt(f.year),parseInt(f.odo)||50000)}]);
    setPage("stock");
  }

  return <div style={{maxWidth:760}}>

    {/* REGO LOOKUP — top of page */}
    <div style={{background:C.s1,border:`1px solid ${regoFound==="found"?C.gb:C.b1}`,borderRadius:12,padding:18,marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>

        </div>
      </div>
    </div>

    {/* AI Score banner */}

function RegoSearch({setStock,setPage}){

  function onFile(e){
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const url=URL.createObjectURL(file);
    setImg(url);
    setResult(null);setErr(null);setConfirmed(false);
    const reader=new FileReader();
    reader.onload=ev=>{
      const b64=ev.target.result.split(",")[1];
      setImgB64(b64);
    };
    reader.readAsDataURL(file);
  }

  async function scanPhoto(){
    if(!imgB64){setErr("No image loaded.");return;}
    setLoading(true);setErr(null);setResult(null);setConfirmed(false);
    const prompt=`You are an expert Australian automotive identifier. Analyse this vehicle photo carefully.

The photo may show:
1. A rear/front/side view of a vehicle — identify the make, model, year, colour, body type
2. A Victorian number plate — read the plate alphanumeric characters exactly

Return ONLY raw JSON, no markdown:
{
  "plate": "<plate text if visible, e.g. ABC123, or null if not visible>",
  "make": "<manufacturer, e.g. Toyota>",
  "model": "<model name, e.g. Camry>",
  "year": <estimated year as number, e.g. 2019>,
  "yearRange": "<e.g. 2018-2020 if uncertain>",
  "colour": "<primary colour>",
  "body": "<Sedan|Hatchback|SUV|Ute|Van|Wagon|Coupe|Convertible>",
  "trans": "<Automatic|Manual|Unknown>",
  "fuel": "<Petrol|Diesel|Hybrid|Electric|Unknown>",
  "engine": "<e.g. 2.5L 4-cyl or Unknown>",
  "confidence": <0-100, how confident you are>,
  "notes": "<any important observations, e.g. facelift model, sport variant, damaged panels>"
}

If you cannot identify the vehicle at all, return: {"error": "Cannot identify vehicle from this image"}`;

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:500,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgB64}},
            {type:"text",text:prompt}
          ]}]
        })
      });
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";

      const parsed=JSON.parse(clean);
      if(parsed.error){setErr(parsed.error);}

        <div style={{fontSize:48,marginBottom:12}}>📷</div>

    phone:"",email:"",mv:"",lowEm:false,pProd:false,
    rwcSer:"",rwcDate:"",rwcTes:"",delDate:new Date().toISOString().split("T")[0],
    wo:"no",ttype:"Dealer-to-Private",pay:"Cash"

    ...stock.map(c=>({...c,_type:"stock"})),
    ...sold.map(s=>({...s,id:"s"+s.id,make:s.make,model:s.model,year:s.year,body:s.body,rego:s.rego,vin:s.vin||"",odo:s.odo||0,colour:"",trans:"",fuel:"",engine:"",_type:"sold"}))

function MarketIntelligence({stock,sold,ul,onReq}){
  if(!ul)return <div style={{maxWidth:520,margin:"40px auto",textAlign:"center"}}>
    <div style={{background:C.s1,border:`1px solid ${C.b2}`,borderRadius:16,padding:48}}>
      <div style={{fontSize:48,marginBottom:14}}>📊</div>
      <div style={{fontSize:20,fontWeight:800,marginBottom:10}}>Market Intelligence</div>
      <div style={{fontSize:14,color:C.t3,marginBottom:24,lineHeight:1.7}}>Your dealership pricing patterns, sell rates and profit analysis. Manager only.</div>
      <Btn v="primary" onClick={onReq}>Enter Manager PIN to Access</Btn>
    </div>
  </div>;
  function open(){
    try{
      localStorage.setItem("lmct_stock",JSON.stringify(stock));
      localStorage.setItem("lmct_sold",JSON.stringify(sold));
      const w=window.open("intel.html","_blank");
      if(!w)alert("Please allow popups to open Market Intelligence.");
    }catch(e){alert("Error: "+e.message);}
  }
  // Quick stats for preview
  const active=stock.filter(c=>c.status!=="Sold");
  const makeStats={};
  sold.forEach(s=>{if(!makeStats[s.make])makeStats[s.make]={count:0,sale:0,profit:0};makeStats[s.make].count++;makeStats[s.make].sale+=s.sale||0;makeStats[s.make].profit+=s.profit||0;});
  const topMake=Object.entries(makeStats).sort((a,b)=>b[1].count-a[1].count)[0];
  const avgSale=sold.length?Math.round(sold.reduce((a,s)=>a+s.sale,0)/sold.length):0;
  const under20=sold.filter(s=>s.sale<20000);
  const over20=sold.filter(s=>s.sale>=20000);
  const dtsAll=[];
  sold.forEach(s=>{const match=stock.find(c=>c.rego===s.rego||(c.make===s.make&&c.model===s.model&&c.year===s.year));if(match&&match.acq&&s.date){const d=Math.round((new Date(s.date)-new Date(match.acq))/86400000);if(d>0&&d<365)dtsAll.push({price:s.sale,days:d});}});
  const fastDTS=dtsAll.filter(d=>d.price<20000);
  const slowDTS=dtsAll.filter(d=>d.price>=20000);
  const avgFast=fastDTS.length?Math.round(fastDTS.reduce((a,d)=>a+d.days,0)/fastDTS.length):null;
  const avgSlow=slowDTS.length?Math.round(slowDTS.reduce((a,d)=>a+d.days,0)/slowDTS.length):null;

  const insights=[];
  if(topMake)insights.push(`Your last ${topMake[1].count} ${topMake[0]}s sold at avg ${fm(Math.round(topMake[1].sale/topMake[1].count))}`);
  if(avgFast&&avgSlow&&avgFast<avgSlow)insights.push(`Cars under $20k sell ${Math.round(((avgSlow-avgFast)/avgSlow)*100)}% faster for you (${avgFast}d vs ${avgSlow}d)`);
  if(sold.length)insights.push(`Your overall avg sale price is ${fm(avgSale)}`);

  return <div style={{background:C.s1,border:`1px solid rgba(124,111,255,.2)`,borderRadius:14,overflow:"hidden"}}>
    <div style={{background:"linear-gradient(135deg,rgba(124,111,255,.12),rgba(31,217,122,.06))",padding:"16px 20px",borderBottom:`1px solid rgba(124,111,255,.15)`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:40,height:40,borderRadius:10,background:"rgba(124,111,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📊</div>
        <div><div style={{fontWeight:800,fontSize:15}}>Market Intelligence</div><div style={{fontSize:11,color:C.t3,marginTop:1}}>Your private pricing & performance data</div></div>
      </div>
      <button onClick={open} style={{padding:"9px 18px",background:C.acc,border:"none",borderRadius:8,color:"white",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Open Full Report →</button>
    </div>
    <div style={{padding:"14px 18px"}}>
      {insights.length>0?<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {insights.map((txt,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",background:C.s2,borderRadius:9,border:`1px solid ${C.b1}`}}>
          <span style={{fontSize:16}}>{i===0?"🏆":i===1?"🚀":"💡"}</span>
          <span style={{fontSize:13,color:C.t1}}>{txt}</span>
        </div>)}
      </div>:<div style={{color:C.t3,fontSize:13,marginBottom:14,textAlign:"center",padding:"14px 0"}}>Add sales to see your market intelligence data</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {[["Total Sold",sold.length,C.g],["In Stock",active.length,C.b],["Avg Sale Price",fm(avgSale),C.a]].map(([l,v,col])=><div key={l} style={{background:C.s2,borderRadius:9,padding:"10px 13px",textAlign:"center"}}>
          <div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>{l}</div>
          <div style={{fontSize:18,fontWeight:800,color:col}}>{v}</div>
        </div>)}
      </div>
    </div>
  </div>;
}

    {id:"intel",label:"Market Intelligence",icon:"📊",aiSpecial:true},
    {id:"strategy",label:"Strategy Engine",icon:"🧠",aiSpecial:true},
    {id:"stock",label:"Stock",icon:"🚗",sec:"Inventory",badge:stock.filter(c=>c.status!=="Sold").length,bc:C.b},
    {id:"add",label:"Add Vehicle",icon:"+"},
    {id:"sold",label:"Sales",icon:"✅",badge:sold.length,bc:C.g},
    {id:"cust",label:"Customers",icon:"👥",sec:"CRM",badge:cust.length,bc:C.b},
    {id:"rego",label:"AI Photo Scanner",icon:"📸",sec:"Tools"},
    {id:"cs",label:"CarSales Hub",icon:"🚘",cs:true},
    {id:"vr",label:"VicRoads / Forms",icon:"📋"},
    {id:"dealer",label:"Dealer Profile",icon:"🏢",sec:"Settings"},
    {id:"margin",label:"Margin Profile",icon:"🔐",special:true},
    {id:"data",label:"Import / Export",icon:"📂"},
  ];
  const titles={dashboard:"Dashboard",stock:"Stock Inventory",add:"Add Vehicle",sold:"Sales History",cust:"Customers",rego:"Rego Lookup",cs:"CarSales Hub",vr:"VicRoads Forms",dealer:"Dealer Profile",margin:"Margin Profile"};
  return <div style={{display:"flex",height:"100vh",background:C.bg,color:C.t1,fontSize:14,overflow:"hidden"}}>
    {showPin&&<PINModal onSuccess={pinOK} onClose={()=>ssp(false)}/>}

    {/* ── SIDEBAR ── */}
    <div style={{width:220,background:C.s1,borderRight:`1px solid ${C.b1}`,display:"flex",flexDirection:"column",flexShrink:0}}>

      {/* Logo */}
      <div style={{padding:"16px 16px 13px",borderBottom:`1px solid ${C.b1}`,display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#7c6fff,#5b4ee0)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="5" height="5" rx="1.5" fill="white" opacity=".9"/>
            <rect x="9" y="2" width="5" height="5" rx="1.5" fill="white" opacity=".6"/>
            <rect x="2" y="9" width="5" height="5" rx="1.5" fill="white" opacity=".6"/>
            <rect x="9" y="9" width="5" height="5" rx="1.5" fill="white" opacity=".9"/>
          </svg>
        </div>
        <div>
          <div style={{fontSize:17,fontWeight:900,letterSpacing:-.5,lineHeight:1}}>LMCT<span style={{color:C.acc}}>PRO</span></div>
          <div style={{fontSize:8,color:C.t4,marginTop:2,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1.5}}>Dealer Platform</div>
        </div>
      </div>

      {/* Nav */}
      <nav style={{flex:1,padding:"8px 8px",display:"flex",flexDirection:"column",gap:1,overflowY:"auto"}}>
        {nav.map(item=>{
          const active=page===item.id,sp2=item.special,isCS=item.cs,isAI=item.aiSpecial;
          return <div key={item.id}>
            {item.sec!==undefined&&item.sec!==null&&item.sec!==""&&<div style={{fontSize:9,color:C.t4,textTransform:"uppercase",letterSpacing:1.3,padding:"12px 8px 3px",fontWeight:700}}>{item.sec}</div>}
            <button onClick={()=>sp(item.id)} style={{
              display:"flex",alignItems:"center",gap:8,padding:"7px 9px",borderRadius:8,
              cursor:"pointer",width:"100%",textAlign:"left",border:"none",fontFamily:"inherit",
              transition:"all .15s",marginBottom:1,
              color:active?C.acc2:isAI?"#a78bfa":isCS?"#ff8533":sp2?(ul?C.g:C.a):C.t2,
              fontSize:12.5,fontWeight:active?700:400,
              background:active?"rgba(124,111,255,.15)":isAI&&!active?"rgba(167,139,250,.06)":isCS&&!active?"rgba(255,102,0,.05)":sp2&&!active?"rgba(245,166,35,.04)":"transparent",
              boxShadow:active?`inset 0 0 0 1px rgba(124,111,255,.2)`:"none",
            }}>
              <span style={{fontSize:14,opacity:active?1:.75}}>{item.icon}</span>
              <span style={{flex:1}}>{item.label}</span>
              {item.badge!=null&&<span style={{background:active?C.acc:item.bc||C.b2,color:active?"#fff":C.t3,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:8,minWidth:18,textAlign:"center",transition:"all .2s"}}>{item.badge}</span>}
              {sp2&&<span style={{fontSize:10,opacity:.6}}>{ul?"🔓":"🔒"}</span>}
            </button>
          </div>;
        })}
      </nav>

      {/* Bottom panel */}
      <div style={{padding:"10px 10px",borderTop:`1px solid ${C.b1}`}}>
        {/* Manager toggle */}
        <div onClick={ul?()=>{su(false);localStorage.setItem("lmct_ul","0");}:()=>req()} style={{
          display:"flex",alignItems:"center",gap:8,padding:"9px 11px",borderRadius:9,
          cursor:"pointer",marginBottom:8,transition:"all .2s",userSelect:"none",
          background:ul?"rgba(31,217,122,.08)":C.s2,
          border:`1px solid ${ul?"rgba(31,217,122,.2)":C.b1}`,
        }}>
          <div style={{width:28,height:16,borderRadius:8,background:ul?C.g:"rgba(255,255,255,.1)",position:"relative",flexShrink:0,transition:"background .2s"}}>
            <div style={{width:12,height:12,borderRadius:"50%",background:"white",position:"absolute",top:2,left:ul?14:2,transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11.5,fontWeight:700,color:ul?C.g:C.t2,lineHeight:1}}>{ul?"Manager Mode":"Staff View"}</div>
            <div style={{fontSize:9.5,color:C.t4,marginTop:2}}>{ul?"Tap to lock margins":"Tap to unlock"}</div>
          </div>
        </div>

        {/* Dealer card */}
        <div style={{background:C.s2,borderRadius:9,padding:"10px 12px",border:`1px solid ${C.b1}`,marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:7,background:C.accd,border:`1px solid rgba(124,111,255,.2)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>🏢</div>
            <div style={{minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:C.t1}}>{dp.dealerName}</div>
              <div style={{fontSize:10,color:C.acc2,fontFamily:"monospace",marginTop:1}}>LMCT {dp.lmct}</div>
            </div>
          </div>
        </div>

        <a href="index.html" style={{display:"flex",alignItems:"center",gap:5,padding:"5px 3px",fontSize:10.5,color:C.t4,textDecoration:"none",opacity:.7}}>
          ← Website
        </a>
      </div>
    </div>

    {/* ── MAIN ── */}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* Topbar */}
      <div style={{height:52,borderBottom:`1px solid ${C.b1}`,display:"flex",alignItems:"center",padding:"0 20px",gap:10,flexShrink:0,background:C.s1}}>
        {/* Breadcrumb title */}
        <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:15,fontWeight:800,letterSpacing:-.3,color:C.t1}}>{titles[page]||page}</div>
          {page==="dashboard"&&<div style={{fontSize:11,color:C.t4,fontFamily:"monospace"}}>· {new Date().toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})}</div>}
        </div>

        {/* Status chips */}
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          {!ul?<div onClick={()=>req()} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:C.s2,border:`1px solid ${C.b2}`,cursor:"pointer",fontSize:11,color:C.t3,transition:"all .15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.acc}
            onMouseLeave={e=>e.currentTarget.style.borderColor=C.b2}>
            <span style={{fontSize:10}}>🔒</span> Unlock margins
          </div>:
          <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:"rgba(31,217,122,.08)",border:`1px solid rgba(31,217,122,.2)`,fontSize:11,color:C.g}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:C.g,display:"inline-block"}}/>
            Manager
          </div>}

          {/* Stock alert chip */}
          {stock.filter(c=>c.status!=="Sold"&&c.regoExp&&Math.round((new Date(c.regoExp)-new Date())/86400000)<=7).length>0&&
            <div onClick={()=>sp("stock")} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:20,background:C.rd,border:`1px solid ${C.rb}`,cursor:"pointer",fontSize:11,color:C.r}}>
              ⚠️ {stock.filter(c=>c.status!=="Sold"&&c.regoExp&&Math.round((new Date(c.regoExp)-new Date())/86400000)<=7).length} rego expiring
            </div>}

          <Clock/>

          <div style={{width:1,height:20,background:C.b2,margin:"0 2px"}}/>
          <Btn sz="sm" v="ghost" onClick={()=>sp("rego")}>📸 Scan</Btn>
          <Btn v="primary" sz="sm" onClick={()=>sp("add")}>+ Add Vehicle</Btn>
        </div>
      </div>

      {/* Page content */}
      <div style={{flex:1,overflowY:"auto",padding:20}}>
        {page==="dashboard"&&<Dashboard stock={stock} sold={sold} cust={cust} setPage={sp} ul={ul} onReq={()=>req()} mp={mp}/>}
        {page==="ai"&&<div><div style={{marginBottom:8}}><div style={{fontSize:20,fontWeight:800}}>AI Business Manager</div><div style={{fontSize:12,color:C.t3,marginTop:3}}>Real-time analysis of your dealership data</div></div><AIManager stock={stock} sold={sold}/></div>}
        {page==="intel"&&<MarketIntelligence stock={stock} sold={sold} ul={ul} onReq={()=>req()}/>}
        {page==="strategy"&&<div style={{maxWidth:680}}>
          {!ul?<div style={{background:C.s1,border:`1px solid ${C.b2}`,borderRadius:16,padding:48,textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:14}}>🧠</div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:10}}>Inventory Strategy Engine</div>
            <div style={{fontSize:14,color:C.t3,marginBottom:24,lineHeight:1.7}}>AI-powered buy/avoid recommendations based on your sales data. Manager only.</div>
            <Btn v="primary" onClick={()=>req()}>Enter Manager PIN to Access</Btn>
          </div>:<div>
            <div style={{background:"linear-gradient(135deg,rgba(124,111,255,.15),rgba(255,77,77,.08))",border:`1px solid rgba(124,111,255,.2)`,borderRadius:14,padding:"22px 24px",marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:900,marginBottom:6}}>🧠 Inventory Strategy Engine</div>
              <div style={{fontSize:13,color:C.t3,lineHeight:1.6,marginBottom:16}}>The AI analyses your complete sales history — body types, makes, price bands, sources — and tells you exactly what to buy more of, what to stop buying, and specific actions for every slow vehicle.</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
                {[["✅","Buy More","What to stock based on your fastest sellers"],["🛑","Stop Buying","What's sitting too long and draining cash"],["⚡","Fix Now","Price drop recommendations for aged stock"]].map(([ic,t,d])=>
                  <div key={t} style={{background:C.s2,borderRadius:10,padding:"12px"}}>
                    <div style={{fontSize:20,marginBottom:5}}>{ic}</div>
                    <div style={{fontSize:12,fontWeight:700,marginBottom:3}}>{t}</div>
                    <div style={{fontSize:11,color:C.t3,lineHeight:1.5}}>{d}</div>
                  </div>
                )}
              </div>
              <button onClick={()=>{
                try{
                  localStorage.setItem("lmct_stock",JSON.stringify(stock));
                  localStorage.setItem("lmct_sold",JSON.stringify(sold));
                  const w=window.open("strategy.html","_blank");
                  if(!w)alert("Please allow popups to open the Strategy Engine.");
                }catch(e){alert("Error: "+e.message);}
              }} style={{width:"100%",padding:"14px",background:C.acc,border:"none",borderRadius:10,color:"white",fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span style={{fontSize:18}}>🧠</span> Open Strategy Engine
              </button>
            </div>
            <div style={{background:C.s2,borderRadius:9,padding:"11px 14px",fontSize:12,color:C.t3,border:`1px solid ${C.b1}`}}>
              💡 Run this monthly or before heading to auction. The more sales history you have, the more precise the recommendations.
            </div>
          </div>}
        </div>}
        {page==="stock"&&<Stock stock={stock} setStock={ss} onSell={c=>setSC(c)} setPage={sp} ul={ul} onReq={()=>req()}/>}
        {page==="add"&&<AddCar setStock={ss} setPage={sp}/>}
        {page==="sold"&&<Sold sold={sold} ul={ul} onReq={()=>req()}/>}
        {page==="cust"&&<Customers cust={cust} setCust={sc} sold={sold}/>}
        {page==="rego"&&<RegoSearch setStock={ss} setPage={sp}/>}
        {page==="cs"&&<CarSalesHub stock={stock}/>}
        {page==="vr"&&<VRForms stock={stock} sold={sold}/>}
        {page==="dealer"&&<DealerProfile/>}
        {page==="margin"&&<MarginProfile ul={ul} onReq={()=>req()}/>}
        {page==="data"&&<DataPage stock={stock} setStock={ss} sold={sold} setSold={sl} cust={cust} setCust={sc}/>}
      </div>
    </div>
    <Modal open={!!sellCar} onClose={()=>setSC(null)} title="Record Vehicle Sale" w={620}>{sellCar&&<SellModal car={sellCar} onConfirm={doSell} onClose={()=>setSC(null)}/>}</Modal>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);




</script>
</body>
</html>
