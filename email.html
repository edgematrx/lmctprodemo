<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LMCT PRO — Email Settings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#080810;color:#eef;min-height:100vh;padding:16px}
.toolbar{background:#0e0e1a;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 18px;display:flex;gap:12px;align-items:center;margin-bottom:16px;max-width:1100px;margin-left:auto;margin-right:auto}
#root{max-width:1100px;margin:0 auto}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="toolbar">
  <div style="font-weight:800;font-size:16px;letter-spacing:-.5px">LMCT<span style="color:#7c6fff">PRO</span></div>
  <div style="color:#9999b8;font-size:13px;flex:1">📧 Email Settings &amp; Live Preview</div>
  <button onclick="window.close()" style="padding:6px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#9999b8;cursor:pointer;font-size:12px;font-family:inherit">✕ Close</button>
</div>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect}=React;
const C={s1:"#0e0e1a",s2:"#141420",s3:"#1c1c2c",b1:"rgba(255,255,255,.05)",b2:"rgba(255,255,255,.09)",b3:"rgba(255,255,255,.16)",t1:"#eeeef8",t2:"#9999b8",t3:"#5f5f7a",t4:"#3a3a52",acc:"#7c6fff",acc2:"#a89dff",accd:"rgba(124,111,255,.12)",g:"#1fd97a",gd:"rgba(31,217,122,.1)",gb:"rgba(31,217,122,.2)",a:"#f5a623",ad:"rgba(245,166,35,.1)",ab:"rgba(245,166,35,.2)",r:"#ff4d4d",rd:"rgba(255,77,77,.1)",rb:"rgba(255,77,77,.2)",b:"#3d9eff"};
const fm=n=>"$"+(parseFloat(n)||0).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2});

const ES0={apiKey:"",senderName:"",senderEmail:"",replyTo:"",emailFooter:"",headerColor:"#0d1f3c",logoUrl:"",signatureImage:"",showSignature:false,autoCc:false,autoSend:true};
const DP0={dealerName:"MDMR Motors",lmct:"11234",abn:"12 345 678 901",address:"123 Dealer Dr, Melbourne VIC 3000",phone:"03 9000 0000",email:"info@mdmrmotors.com.au"};

function gES(){try{return{...ES0,...JSON.parse(localStorage.getItem("lmct_email")||"{}")};}catch(e){return ES0;}}
function gDP(){try{return{...DP0,...JSON.parse(localStorage.getItem("lp_d")||"{}")};}catch(e){return DP0;}}
function sES(v){localStorage.setItem("lmct_email",JSON.stringify(v));}

const Inp=({value,onChange,placeholder,type="text",hint})=><div>
  <input style={{background:C.s3,border:`1px solid ${C.b2}`,borderRadius:7,padding:"8px 11px",color:C.t1,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%"}} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""} type={type}/>
  {hint&&<div style={{fontSize:10,color:C.t4,marginTop:3}}>{hint}</div>}
</div>;
const FG=({label,children,full})=><div style={{display:"flex",flexDirection:"column",gap:5,gridColumn:full?"1/-1":""}}>
  <label style={{fontSize:11,color:C.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>{label}</label>
  {children}
</div>;
const Toggle=({value,onChange,label,desc})=><div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
  <div onClick={()=>onChange(!value)} style={{width:36,height:20,borderRadius:10,background:value?C.g:"rgba(255,255,255,.1)",position:"relative",flexShrink:0,cursor:"pointer",transition:"background .2s",marginTop:2}}>
    <div style={{width:16,height:16,borderRadius:"50%",background:"white",position:"absolute",top:2,left:value?18:2,transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
  </div>
  <div><div style={{fontSize:13,color:C.t1,fontWeight:500}}>{label}</div>{desc&&<div style={{fontSize:11,color:C.t3,marginTop:1}}>{desc}</div>}</div>
</div>;
const Btn=({children,onClick,v="ghost",disabled,full})=>{
  const vs={primary:{background:C.acc,color:"#fff",border:"none"},ghost:{background:"transparent",color:C.t2,border:`1px solid ${C.b2}`},green:{background:C.gd,color:C.g,border:`1px solid ${C.gb}`}};
  return <button onClick={onClick} disabled={disabled} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:5,width:full?"100%":"",padding:"8px 15px",borderRadius:8,fontWeight:500,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",fontSize:13,transition:"all .15s",opacity:disabled?.4:1,...vs[v]}}>{children}</button>;
};
const Divider=({label})=>label?<div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0"}}><div style={{flex:1,height:1,background:C.b1}}/><span style={{fontSize:10,color:C.t4,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{label}</span><div style={{flex:1,height:1,background:C.b1}}/></div>:<div style={{height:1,background:C.b1,margin:"14px 0"}}/>;

function EmailApp(){
  const [es,setEs]=useState(gES);
  const [saved,setSaved]=useState(false);
  const [testing,setTesting]=useState(null);
  const dp=gDP();
  const set=k=>v=>setEs(p=>({...p,[k]:v}));

  function save(){sES(es);setSaved(true);setTimeout(()=>setSaved(false),2500);}

  async function sendTest(){
    if(!es.apiKey){alert("Enter your Resend API key first.");return;}
    const to=es.replyTo||dp.email;
    if(!to){alert("Enter a Reply-To email to receive the test.");return;}
    setTesting("sending");
    const duty=Math.round(28990*0.055/10)*10;
    const gst=28990/11;
    const exGst=28990-gst;
    const hc=es.headerColor||"#0d1f3c";
    const pn=es.senderName||dp.dealerName;
    const html2=buildEmail({buyer:"Michael Johnson",email:to,sale:28990,year:2020,make:"Toyota",model:"Camry",rego:"ABC123",date:new Date().toLocaleDateString("en-AU"),pay:"Cash",odo:45000,colour:"Silver",bAddr:"12 Smith St, Melbourne VIC 3000",licence:"",bPhone:"0412 345 678"},null,dp,es);
    try{
      const res=await fetch("https://api.resend.com/emails",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+es.apiKey},body:JSON.stringify({from:`${pn} <${es.senderEmail||dp.email||"noreply@lmctpro.com.au"}>`,to:[to],subject:`[TEST] Purchase documents — 2020 Toyota Camry`,html:html2})});
      const d=await res.json();
      setTesting(d.id?"sent":"failed");
    }catch(e){setTesting("failed");}
    setTimeout(()=>setTesting(null),4000);
  }

  // Live email preview component
  function Preview(){
    const pn=es.senderName||dp.dealerName||"Your Dealership";
    const pe=es.senderEmail||dp.email||"info@yourdealership.com.au";
    const hc=es.headerColor||"#0d1f3c";
    const row=(l,v)=><div style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",borderBottom:"1px solid #f5f5f5"}}><span style={{color:"#666"}}>{l}</span><span style={{fontWeight:600,color:"#0d1f3c"}}>{v}</span></div>;
    return <div style={{background:"white",borderRadius:10,overflow:"hidden",fontSize:12,color:"#333",fontFamily:"Arial,sans-serif",boxShadow:"0 4px 32px rgba(0,0,0,.2)",animation:"fadeIn .3s ease"}}>
      {/* Email client header */}
      <div style={{background:"#f3f4f6",padding:"8px 14px",borderBottom:"1px solid #e5e7eb"}}>
        <div style={{display:"flex",gap:5,marginBottom:5}}>{["#ef4444","#f59e0b","#22c55e"].map(bg=><div key={bg} style={{width:10,height:10,borderRadius:"50%",background:bg}}/>)}</div>
        <div style={{fontSize:11,color:"#374151",marginBottom:2}}><strong>From:</strong> {pn} &lt;{pe}&gt;</div>
        <div style={{fontSize:11,color:"#374151",marginBottom:2}}><strong>To:</strong> Michael Johnson &lt;michael@example.com.au&gt;</div>
        <div style={{fontSize:11,color:"#374151"}}><strong>Subject:</strong> Your purchase documents — 2020 Toyota Camry · {pn}</div>
      </div>
      {/* Email body */}
      <div style={{maxHeight:580,overflowY:"auto"}}>
        {/* Header */}
        <div style={{background:hc,padding:"16px 20px",display:"flex",alignItems:"center",gap:10}}>
          {es.logoUrl?<img src={es.logoUrl} alt="logo" style={{height:34,maxWidth:100,objectFit:"contain",borderRadius:4}}/>:
          <div style={{width:34,height:34,borderRadius:8,background:"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🏢</div>}
          <div><div style={{color:"white",fontWeight:700,fontSize:14}}>{pn}</div><div style={{color:"rgba(255,255,255,.5)",fontSize:11}}>Vehicle Purchase Documents</div></div>
        </div>
        {/* Intro */}
        <div style={{padding:"16px 20px",borderBottom:"2px solid #f3f4f6",background:"white"}}>
          <div style={{display:"inline-block",background:hc,color:"white",padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:700,marginBottom:8}}>2020 Toyota Camry · ABC123</div>
          <p style={{fontSize:12,color:"#444",lineHeight:1.6,marginBottom:8}}>Hi <strong>Michael Johnson</strong>, thank you for your purchase from <strong>{pn}</strong>. This email contains all 3 of your purchase documents.</p>
          <div style={{background:"#fff7ed",border:"1px solid #fbbf24",borderRadius:5,padding:"8px 12px",fontSize:11,color:"#92400e"}}>⚠️ Stamp duty $1,594.45 — lodge with VicRoads within 14 days</div>
        </div>
        {/* Documents */}
        {[
          {title:"Sales Contract",sub:"Motor Car Traders Act 1986",content:<div>{row("Dealer",pn)}{row("LMCT",dp.lmct||"11234")}{row("Buyer","Michael Johnson")}{row("Vehicle","2020 Toyota Camry")}{row("Rego","ABC123")}{row("Sale Price","$28,990.00")}{row("Payment","Cash")}{row("Date",new Date().toLocaleDateString("en-AU"))}</div>},
          {title:"Tax Invoice",sub:"GST Compliant",content:<div>
            {[["Vehicle (excl. GST)","$26,354.55"],["GST (10%)","$2,635.45"],["Transfer Fee","$32.80"],["Stamp Duty","$1,594.45"]].map(([l,v])=><div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",borderBottom:"1px solid #f5f5f5"}}><span style={{color:"#666"}}>{l}</span><span>{v}</span></div>)}
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,background:hc,color:"white",padding:"5px 8px",marginTop:5,fontSize:12,borderRadius:3}}><span>TOTAL PAYABLE</span><span>$31,262.80</span></div>
          </div>},
          {title:"VicRoads Transfer Notice",sub:"DTP-1142 (Buyer Copy)",content:<div>
            {row("Registration","ABC123")}{row("Vehicle","2020 Toyota Camry")}{row("Buyer","Michael Johnson")}{row("Stamp Duty","$1,594.45")}
            <div style={{background:"#fff7ed",border:"1px solid #fbbf24",borderRadius:4,padding:"6px 10px",marginTop:6,fontSize:11,color:"#92400e"}}>Lodge at VicRoads within 14 days with stamp duty payment</div>
            {es.showSignature&&es.signatureImage&&<div style={{marginTop:8}}><div style={{fontSize:10,color:"#888",marginBottom:2}}>Authorised Signature:</div><img src={es.signatureImage} alt="sig" style={{height:32,maxWidth:120,objectFit:"contain"}}/></div>}
          </div>},
        ].map((doc,i)=><div key={doc.title}>
          <div style={{background:hc,color:"rgba(255,255,255,.7)",padding:"5px 20px",fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>Document {i+1} of 3 — {doc.title}</div>
          <div style={{padding:"12px 20px",borderBottom:"1px solid #f0f0f0"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#0d1f3c",marginBottom:8,paddingBottom:5,borderBottom:"2px solid #0d1f3c"}}>{doc.sub}</div>
            {doc.content}
          </div>
        </div>)}
        {/* Footer */}
        <div style={{background:"#f8f9fa",padding:"12px 20px",borderTop:"1px solid #e5e7eb"}}>
          {es.logoUrl&&<img src={es.logoUrl} alt="logo" style={{height:16,maxWidth:60,objectFit:"contain",marginBottom:4,display:"block"}}/>}
          <div style={{fontSize:10,color:"#6b7280"}}><strong>{pn}</strong> · {dp.address} · LMCT {dp.lmct||"—"}{dp.abn?" · ABN "+dp.abn:""}{dp.phone?" · "+dp.phone:""}</div>
          {es.emailFooter&&<div style={{fontSize:10,color:"#9ca3af",marginTop:2,fontStyle:"italic"}}>{es.emailFooter}</div>}
        </div>
      </div>
    </div>;
  }

  return <div style={{display:"grid",gridTemplateColumns:"400px 1fr",gap:16,alignItems:"start"}}>
    {/* LEFT — Settings */}
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:C.gd,border:`1px solid ${C.gb}`,borderRadius:10,padding:"12px 14px",fontSize:12,color:C.g}}>
        ✅ <strong>Resend.com</strong> — free for 3,000 emails/month. Sign up at resend.com in 2 minutes.
      </div>

      {/* API Key */}
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,padding:18}}>
        <Divider label="API Connection"/>
        <FG label="Resend API Key" hint="From resend.com → API Keys → Create. Starts with re_...">
          <Inp value={es.apiKey||""} onChange={set("apiKey")} placeholder="re_xxxxxxxxxxxxxxxxxxxxxxxx" type="password"/>
        </FG>
      </div>

      {/* Branding */}
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,padding:18}}>
        <Divider label="Branding"/>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:C.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Header Colour</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["#0d1f3c","#1a1a2e","#0f3460","#1b4332","#6b21a8","#7c3aed","#b91c1c","#1e3a5f"].map(col=>
              <div key={col} onClick={()=>set("headerColor")(col)} style={{width:28,height:28,borderRadius:6,background:col,cursor:"pointer",border:es.headerColor===col?`3px solid white`:"3px solid transparent",transition:"all .15s"}}/>
            )}
            <input type="color" value={es.headerColor||"#0d1f3c"} onChange={e=>set("headerColor")(e.target.value)} style={{width:28,height:28,borderRadius:6,border:"none",cursor:"pointer",padding:0}}/>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:C.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Dealer Logo</div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            {es.logoUrl?<div style={{position:"relative"}}>
              <img src={es.logoUrl} alt="logo" style={{height:40,maxWidth:120,objectFit:"contain",borderRadius:6,background:C.s3,padding:4}}/>
              <button onClick={()=>set("logoUrl")("")} style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:C.r,border:"none",color:"white",fontSize:10,cursor:"pointer"}}>✕</button>
            </div>:
            <div style={{width:80,height:40,background:C.s2,border:`2px dashed ${C.b2}`,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:C.t4}}>No logo</div>}
            <div>
              <input type="file" accept="image/*" style={{display:"none"}} id="logoUpload" onChange={e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>set("logoUrl")(ev.target.result);r.readAsDataURL(f);}}/>
              <Btn onClick={()=>document.getElementById("logoUpload").click()}>📁 Upload Logo</Btn>
              <div style={{fontSize:10,color:C.t4,marginTop:4}}>PNG recommended · max 200×60px</div>
            </div>
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:C.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Signature Image (optional)</div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            {es.signatureImage?<div style={{position:"relative"}}>
              <img src={es.signatureImage} alt="sig" style={{height:36,maxWidth:120,objectFit:"contain",borderRadius:4,background:C.s3,padding:4}}/>
              <button onClick={()=>set("signatureImage")("")} style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:C.r,border:"none",color:"white",fontSize:10,cursor:"pointer"}}>✕</button>
            </div>:
            <div style={{width:80,height:36,background:C.s2,border:`2px dashed ${C.b2}`,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:C.t4}}>No sig</div>}
            <div>
              <input type="file" accept="image/*" style={{display:"none"}} id="sigUpload" onChange={e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>set("signatureImage")(ev.target.result);r.readAsDataURL(f);}}/>
              <Btn onClick={()=>document.getElementById("sigUpload").click()}>📁 Upload Signature</Btn>
            </div>
          </div>
          <div style={{marginTop:8}}><Toggle value={es.showSignature} onChange={set("showSignature")} label="Show signature on VicRoads form"/></div>
        </div>
      </div>

      {/* Sender */}
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,padding:18}}>
        <Divider label="Sender Details"/>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <FG label="Sender Name" hint="Shows as 'From' name in buyer's inbox">
            <Inp value={es.senderName||""} onChange={set("senderName")} placeholder={dp.dealerName||"MDMR Motors"}/>
          </FG>
          <FG label="Sender Email" hint="Must be verified in your Resend account">
            <Inp value={es.senderEmail||""} onChange={set("senderEmail")} placeholder="contracts@mdmrmotors.com.au"/>
          </FG>
          <FG label="Reply-To Email" hint="Where buyer replies land — usually your main inbox">
            <Inp value={es.replyTo||""} onChange={set("replyTo")} placeholder="info@mdmrmotors.com.au"/>
          </FG>
          <FG label="Email Footer" hint="Tagline, website, disclaimer — appears at bottom">
            <textarea value={es.emailFooter||""} onChange={e=>set("emailFooter")(e.target.value)} placeholder="mdmrmotors.com.au · Trusted Melbourne LMCT Dealer" style={{background:C.s3,border:`1px solid ${C.b2}`,borderRadius:7,padding:"8px 11px",color:C.t1,fontSize:12,fontFamily:"inherit",outline:"none",width:"100%",resize:"vertical",minHeight:50}}/>
          </FG>
        </div>
      </div>

      {/* Toggles */}
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,padding:18}}>
        <Divider label="Auto-Send Settings"/>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Toggle value={es.autoSend} onChange={set("autoSend")} label="Auto-send on sale confirmation" desc="Fires automatically the moment you click Confirm Sale"/>
          <Toggle value={es.autoCc} onChange={set("autoCc")} label="CC dealership on every email" desc="You receive a copy of every document email sent to buyers"/>
        </div>
      </div>

      {/* Actions */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <Btn v="primary" onClick={save}>💾 {saved?"✓ Saved":"Save Settings"}</Btn>
        <Btn v="green" onClick={sendTest} disabled={!es.apiKey}>
          {testing==="sending"?"📨 Sending...":testing==="sent"?"✅ Test Sent!":testing==="failed"?"❌ Failed":"📨 Send Test Email"}
        </Btn>
      </div>
      <div style={{background:C.s2,borderRadius:9,padding:"11px 14px",fontSize:11,color:C.t3,border:`1px solid ${C.b1}`,lineHeight:1.6}}>
        <strong style={{color:C.t2}}>Setup guide:</strong><br/>
        1. Sign up free at <strong style={{color:C.acc2}}>resend.com</strong><br/>
        2. Add your domain → verify with 2 DNS records at VentraIP<br/>
        3. Create API key → paste above<br/>
        4. Enter sender email (must match verified domain)<br/>
        5. Click Send Test Email → check inbox<br/>
        6. Save — every sale now auto-emails buyer
      </div>
    </div>

    {/* RIGHT — Live preview */}
    <div style={{position:"sticky",top:16}}>
      <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:.8,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:6,height:6,borderRadius:"50%",background:C.g,display:"inline-block"}}/>
        Live Preview — updates as you type
      </div>
      <Preview/>
      <div style={{marginTop:8,fontSize:11,color:C.t4,textAlign:"center"}}>This is exactly what buyers receive after every sale</div>
    </div>
  </div>;
}

function buildEmail(sale,car,dp,es){
  const duty=Math.round((parseFloat(sale.sale)||0)*0.055/10)*10;
  const gst=(sale.sale/11);
  const exGst=sale.sale-gst;
  const transferFee=32.80;
  const total=sale.sale+transferFee+duty;
  const hc=es.headerColor||"#0d1f3c";
  const pn=es.senderName||dp.dealerName;
  const fmt=n=>"$"+(parseFloat(n)||0).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2});
  const rego=car&&car.rego?car.rego:sale.rego||"";
  const vin=car&&car.vin?car.vin:sale.vin||"";
  const today=sale.date||new Date().toLocaleDateString("en-AU");
