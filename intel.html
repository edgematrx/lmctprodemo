<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LMCT PRO — Market Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#080810;color:#eef;min-height:100vh;padding:16px}
.toolbar{background:#0e0e1a;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 18px;display:flex;gap:12px;align-items:center;margin-bottom:16px;max-width:960px;margin-left:auto;margin-right:auto}
#root{max-width:960px;margin:0 auto}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
</style>
</head>
<body>
<div class="toolbar">
  <div style="font-weight:800;font-size:16px;letter-spacing:-.5px">LMCT<span style="color:#7c6fff">PRO</span></div>
  <div style="color:#9999b8;font-size:13px;flex:1">📊 Market Intelligence</div>
  <button onclick="window.close()" style="padding:6px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#9999b8;cursor:pointer;font-size:12px;font-family:inherit">✕ Close</button>
</div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">

const {useState,useEffect}=React;
const fm=n=>"$"+(parseFloat(n)||0).toLocaleString("en-AU",{minimumFractionDigits:0,maximumFractionDigits:0});
const fd=d=>{if(!d)return"—";try{return new Date(d).toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"});}catch{return d;}};
const dAgo=d=>d?Math.round((new Date()-new Date(d))/86400000):0;
const dUntil=d=>d?Math.round((new Date(d)-new Date())/86400000):999;
const C={bg:"#080810",s1:"#0e0e1a",s2:"#141420",s3:"#1c1c2c",s4:"#222234",b1:"rgba(255,255,255,.05)",b2:"rgba(255,255,255,.09)",b3:"rgba(255,255,255,.16)",t1:"#eeeef8",t2:"#9999b8",t3:"#5f5f7a",t4:"#3a3a52",acc:"#7c6fff",acc2:"#a89dff",accd:"rgba(124,111,255,.12)",g:"#1fd97a",gd:"rgba(31,217,122,.1)",gb:"rgba(31,217,122,.2)",a:"#f5a623",ad:"rgba(245,166,35,.1)",ab:"rgba(245,166,35,.2)",r:"#ff4d4d",rd:"rgba(255,77,77,.1)",rb:"rgba(255,77,77,.2)",b:"#3d9eff",bd:"rgba(61,158,255,.1)",bb:"rgba(61,158,255,.2)"};
const Btn=({children,onClick,v="ghost",sz="md",disabled,full,st={}})=>{const sizes={xs:{padding:"3px 8px",fontSize:11},sm:{padding:"5px 11px",fontSize:12},md:{padding:"8px 15px",fontSize:13}};const vs={primary:{background:C.acc,color:"#fff",border:"none"},ghost:{background:"transparent",color:C.t2,border:`1px solid ${C.b2}`},green:{background:C.gd,color:C.g,border:`1px solid ${C.gb}`}};return <button onClick={onClick} disabled={disabled} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:5,width:full?"100%":"",borderRadius:8,fontWeight:500,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",transition:"all .15s",opacity:disabled?.4:1,...sizes[sz],...vs[v],...st}}>{children}</button>;};

// ── MARKET INTELLIGENCE ──
function MarketIntelligence({stock,sold,ul,onReq}){
  if(!ul)return <div style={{maxWidth:520,margin:"40px auto",textAlign:"center"}}>
    <div style={{background:C.s1,border:`1px solid ${C.b2}`,borderRadius:16,padding:48}}>
      <div style={{fontSize:48,marginBottom:14}}>📊</div>
      <div style={{fontSize:20,fontWeight:800,marginBottom:10}}>Market Intelligence</div>
      <div style={{fontSize:14,color:C.t3,marginBottom:24,lineHeight:1.7}}>Your dealership's private market data — pricing patterns, sell rates, profit analysis. Manager only.</div>
      <Btn v="primary" onClick={onReq}>Enter Manager PIN to Access</Btn>
    </div>
  </div>;

  // ── COMPUTE ALL STATS FROM REAL DATA ──
  const active=stock.filter(c=>c.status!=="Sold");

  // Days to sell — match sold records back to stock by rego/make+model+year
  function daysToSell(s){
    const match=stock.find(c=>(c.rego&&c.rego===s.rego)||(c.make===s.make&&c.model===s.model&&c.year===s.year));
    if(match&&match.acq&&s.date){const d=Math.round((new Date(s.date)-new Date(match.acq))/86400000);return d>0&&d<365?d:null;}
    return null;
  }

  // By make
  const makeStats={};
  sold.forEach(s=>{
    if(!makeStats[s.make])makeStats[s.make]={sales:[],profits:[],dts:[],revenue:0};
    makeStats[s.make].sales.push(s.sale);
    makeStats[s.make].profits.push(s.profit||0);
    makeStats[s.make].revenue+=s.sale||0;
    const d=daysToSell(s);if(d)makeStats[s.make].dts.push(d);
  });
  const makeRows=Object.entries(makeStats).map(([make,d])=>({
    make,count:d.sales.length,
    avgSale:Math.round(d.sales.reduce((a,b)=>a+b,0)/d.sales.length),
    avgProfit:Math.round(d.profits.reduce((a,b)=>a+b,0)/d.profits.length),
    avgDTS:d.dts.length?Math.round(d.dts.reduce((a,b)=>a+b,0)/d.dts.length):null,
    totalRevenue:d.revenue,
  })).sort((a,b)=>b.count-a.count);

  // By price band
  const bands=[
    {label:"Under $15k",min:0,max:15000},
    {label:"$15k–$20k",min:15000,max:20000},
    {label:"$20k–$25k",min:20000,max:25000},
    {label:"$25k–$35k",min:25000,max:35000},
    {label:"Over $35k",min:35000,max:999999},
  ];
  const bandStats=bands.map(b=>{
    const bsold=sold.filter(s=>s.sale>=b.min&&s.sale<b.max);
    const dtsArr=bsold.map(s=>daysToSell(s)).filter(Boolean);
    const profits=bsold.map(s=>s.profit||0);
    return{...b,count:bsold.length,
      avgDTS:dtsArr.length?Math.round(dtsArr.reduce((a,b)=>a+b,0)/dtsArr.length):null,
      avgProfit:profits.length?Math.round(profits.reduce((a,b)=>a+b,0)/profits.length):0,
      avgSale:bsold.length?Math.round(bsold.reduce((a,s)=>a+s.sale,0)/bsold.length):0,
    };
  }).filter(b=>b.count>0);

  // By source
  const srcStats={};
  sold.forEach(s=>{
    const match=stock.find(c=>(c.rego&&c.rego===s.rego)||(c.make===s.make&&c.model===s.model&&c.year===s.year));
    const src=match?.source||"Unknown";
    if(!srcStats[src])srcStats[src]={count:0,profits:[],revenue:0};
    srcStats[src].count++;srcStats[src].profits.push(s.profit||0);srcStats[src].revenue+=s.sale||0;
  });
  const srcRows=Object.entries(srcStats).map(([src,d])=>({src,count:d.count,avgProfit:Math.round(d.profits.reduce((a,b)=>a+b,0)/d.profits.length),totalRevenue:d.revenue})).sort((a,b)=>b.avgProfit-a.avgProfit);

  // Monthly trend
  const monthly={};
  sold.forEach(s=>{if(!s.date)return;const k=s.date.substring(0,7);if(!monthly[k])monthly[k]={count:0,revenue:0,profit:0};monthly[k].count++;monthly[k].revenue+=s.sale||0;monthly[k].profit+=s.profit||0;});
  const monthRows=Object.entries(monthly).sort().slice(-6).map(([m,d])=>({month:m.replace("-","/"),...d}));
  const maxRev=Math.max(...monthRows.map(r=>r.revenue),1);

  // Key insights — auto-generated from real data
  const insights=[];
  // Best make
  if(makeRows.length){
    const best=makeRows[0];
    insights.push({icon:"🏆",color:C.g,text:`Your top seller is ${best.make} — ${best.count} sold, avg ${fm(best.avgSale)} per unit`});
    if(best.avgDTS)insights.push({icon:"⚡",color:C.b,text:`${best.make}s sell in avg ${best.avgDTS} days for you — stock more`});
  }
  // Fastest price band
  if(bandStats.length){
    const fastest=[...bandStats].filter(b=>b.avgDTS).sort((a,b)=>a.avgDTS-b.avgDTS)[0];
    if(fastest)insights.push({icon:"🚀",color:C.g,text:`Cars in the ${fastest.label} range sell fastest — avg ${fastest.avgDTS} days`});
    // Most profitable band
    const mostProfit=[...bandStats].sort((a,b)=>b.avgProfit-a.avgProfit)[0];
    if(mostProfit)insights.push({icon:"💰",color:C.a,text:`${mostProfit.label} vehicles give you the best margins — avg ${fm(mostProfit.avgProfit)} gross profit`});
  }
  // Best source
  if(srcRows.length){
    const bestSrc=srcRows[0];
    insights.push({icon:"📦",color:C.acc2,text:`${bestSrc.src} is your best source — avg ${fm(bestSrc.avgProfit)} profit per vehicle`});
  }
  // Slow stock
  const slowMake=makeRows.find(m=>m.avgDTS&&m.avgDTS>40);
  if(slowMake)insights.push({icon:"⚠️",color:C.r,text:`${slowMake.make}s are sitting ${slowMake.avgDTS} days avg — review your pricing`});
  // Aged stock
  const aged=active.filter(c=>dAgo(c.acq)>60);
  if(aged.length)insights.push({icon:"🕐",color:C.a,text:`${aged.length} vehicle${aged.length>1?"s":""} over 60 days in stock — consider price drops to free up cash`});

  function Bar({value,max,color,label,sub}){
    const pct=Math.round((value/max)*100);
    return <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:12,color:C.t2}}>{label}</span>
        <span style={{fontSize:12,fontWeight:700,color}}>{sub}</span>
      </div>
      <div style={{background:C.s3,borderRadius:4,height:6,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:color,borderRadius:4,transition:"width .6s"}}/>
      </div>
    </div>;
  }

  return <div style={{maxWidth:900}}>
    {/* Page header */}
    <div style={{background:"linear-gradient(135deg,rgba(124,111,255,.12),rgba(31,217,122,.06))",border:`1px solid rgba(124,111,255,.2)`,borderRadius:14,padding:"18px 22px",marginBottom:18,display:"flex",alignItems:"center",gap:14}}>
      <div style={{fontSize:36}}>📊</div>
      <div>
        <div style={{fontSize:18,fontWeight:800,letterSpacing:-.3}}>Market Intelligence</div>
        <div style={{fontSize:12,color:C.t3,marginTop:3}}>Based on your {sold.length} completed sales · {active.length} vehicles in stock · Data updates in real time</div>
      </div>
    </div>

    {/* KEY INSIGHTS — the money section */}
    {insights.length>0&&<div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,marginBottom:16,overflow:"hidden"}}>
      <div style={{padding:"12px 18px",borderBottom:`1px solid ${C.b1}`,fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:8}}>
        <span>💡</span> Key Insights from Your Sales Data
      </div>
      <div style={{padding:"6px 0"}}>
        {insights.map((ins,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"11px 18px",borderBottom:i<insights.length-1?`1px solid ${C.b1}`:"none"}}>
          <span style={{fontSize:20,flexShrink:0}}>{ins.icon}</span>
          <div style={{flex:1,fontSize:13,color:C.t1,lineHeight:1.5}}>{ins.text}</div>
          <div style={{width:4,height:"100%",background:ins.color,borderRadius:2,flexShrink:0,alignSelf:"stretch",minHeight:20}}/>
        </div>)}
      </div>
    </div>}

    {/* GRID: By Make + By Price Band */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>

      {/* By Make */}
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.b1}`,fontWeight:700,fontSize:13}}>🚗 Performance by Make</div>
        {makeRows.length===0?<div style={{padding:24,textAlign:"center",color:C.t3,fontSize:12}}>No sales data yet</div>:
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:C.s2}}>{["Make","Sold","Avg Sale","Avg Profit","Avg Days"].map(h=><th key={h} style={{padding:"7px 12px",textAlign:"left",fontSize:10,color:C.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:.4,borderBottom:`1px solid ${C.b1}`}}>{h}</th>)}</tr></thead>
          <tbody>{makeRows.map((r,i)=><tr key={r.make} style={{background:i===0?"rgba(31,217,122,.03)":"transparent"}} onMouseEnter={e=>e.currentTarget.style.background=C.s2} onMouseLeave={e=>e.currentTarget.style.background=i===0?"rgba(31,217,122,.03)":"transparent"}>
            <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.b1}`}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {i===0&&<span style={{fontSize:10}}>🏆</span>}
                <span style={{fontWeight:600,fontSize:13}}>{r.make}</span>
              </div>
            </td>
            <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.b1}`,fontWeight:700,color:C.b}}>{r.count}</td>
            <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.b1}`,fontSize:12,color:C.t1}}>{fm(r.avgSale)}</td>
            <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.b1}`,fontWeight:700,color:r.avgProfit>0?C.g:C.r}}>{fm(r.avgProfit)}</td>
            <td style={{padding:"9px 12px",borderBottom:`1px solid ${C.b1}`,fontSize:12,color:r.avgDTS?r.avgDTS<30?C.g:r.avgDTS<60?C.a:C.r:C.t3}}>{r.avgDTS?r.avgDTS+"d":"—"}</td>
          </tr>)}</tbody>
        </table>}
      </div>

      {/* By Price Band */}
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.b1}`,fontWeight:700,fontSize:13}}>💰 Performance by Price Range</div>
        {bandStats.length===0?<div style={{padding:24,textAlign:"center",color:C.t3,fontSize:12}}>No sales data yet</div>:
        <div style={{padding:"12px 16px"}}>
          {bandStats.map(b=>{
            const fastest=[...bandStats].filter(x=>x.avgDTS).sort((a,b)=>a.avgDTS-b.avgDTS)[0];
            const isFastest=fastest&&b.label===fastest.label;
            return <div key={b.label} style={{marginBottom:14,padding:"10px 12px",background:isFastest?"rgba(31,217,122,.06)":C.s2,borderRadius:9,border:`1px solid ${isFastest?C.gb:C.b1}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:13,fontWeight:700,color:C.t1}}>{b.label}</span>
                  {isFastest&&<span style={{fontSize:10,fontWeight:600,color:C.g,background:C.gd,padding:"1px 6px",borderRadius:10}}>🚀 Fastest</span>}
                </div>
                <span style={{fontSize:11,color:C.t3}}>{b.count} sold</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[["Avg Sale",fm(b.avgSale),C.t1],["Avg Profit",fm(b.avgProfit),b.avgProfit>0?C.g:C.r],["Avg Days",b.avgDTS?b.avgDTS+"d":"—",b.avgDTS?b.avgDTS<30?C.g:b.avgDTS<60?C.a:C.r:C.t3]].map(([l,v,col])=>
                  <div key={l} style={{background:C.s1,borderRadius:7,padding:"6px 9px"}}>
                    <div style={{fontSize:9,color:C.t4,textTransform:"uppercase",letterSpacing:.4,marginBottom:3}}>{l}</div>
                    <div style={{fontSize:13,fontWeight:700,color:col}}>{v}</div>
                  </div>
                )}
              </div>
            </div>;
          })}
        </div>}
      </div>
    </div>

    {/* GRID: Monthly trend + By Source */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>

      {/* Monthly Revenue Chart */}
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.b1}`,fontWeight:700,fontSize:13}}>📈 Monthly Revenue (last 6 months)</div>
        {monthRows.length===0?<div style={{padding:24,textAlign:"center",color:C.t3,fontSize:12}}>No sales data yet</div>:
        <div style={{padding:"16px"}}>
          {monthRows.map(r=>{
            const pct=Math.round((r.revenue/maxRev)*100);
            return <div key={r.month} style={{marginBottom:11}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,color:C.t3,fontWeight:600}}>{r.month}</span>
                <div style={{display:"flex",gap:10}}>
                  <span style={{fontSize:12,fontWeight:700,color:C.g}}>{fm(r.revenue)}</span>
                  <span style={{fontSize:11,color:C.t3}}>{r.count} sold</span>
                </div>
              </div>
              <div style={{background:C.s3,borderRadius:4,height:8,overflow:"hidden"}}>
                <div style={{width:pct+"%",height:"100%",background:`linear-gradient(90deg,${C.acc},${C.g})`,borderRadius:4,transition:"width .6s"}}/>
              </div>
              <div style={{marginTop:3,fontSize:10,color:C.t4}}>Profit: {fm(r.profit)}</div>
            </div>;
          })}
        </div>}
      </div>

      {/* By Source */}
      <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.b1}`,fontWeight:700,fontSize:13}}>📦 Profit by Stock Source</div>
        {srcRows.length===0?<div style={{padding:24,textAlign:"center",color:C.t3,fontSize:12}}>No sales data yet</div>:
        <div style={{padding:"12px 16px"}}>
          {srcRows.map((r,i)=>{
            const maxP=Math.max(...srcRows.map(x=>x.avgProfit),1);
            return <div key={r.src} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  {i===0&&<span style={{fontSize:12}}>⭐</span>}
                  <span style={{fontSize:13,fontWeight:600,color:C.t1}}>{r.src}</span>
                  <span style={{fontSize:10,color:C.t3}}>{r.count} sold</span>
                </div>
                <span style={{fontSize:13,fontWeight:700,color:r.avgProfit>0?C.g:C.r}}>{fm(r.avgProfit)}<span style={{fontSize:10,color:C.t3,fontWeight:400}}> avg profit</span></span>
              </div>
              <div style={{background:C.s3,borderRadius:4,height:6,overflow:"hidden"}}>
                <div style={{width:Math.round((r.avgProfit/maxP)*100)+"%",height:"100%",background:i===0?C.g:C.acc,borderRadius:4,transition:"width .6s"}}/>
              </div>
            </div>;
          })}
          <div style={{marginTop:14,padding:"10px 12px",background:C.s2,borderRadius:9,fontSize:12,color:C.t3,border:`1px solid ${C.b1}`}}>
            💡 Source your stock from <strong style={{color:C.t1}}>{srcRows[0]?.src}</strong> — it generates the highest profit margin for you.
          </div>
        </div>}
      </div>
    </div>

    {/* Current Stock Intelligence */}
    <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:12,overflow:"hidden"}}>
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.b1}`,fontWeight:700,fontSize:13}}>🔍 Current Stock Analysis</div>
      {active.length===0?<div style={{padding:24,textAlign:"center",color:C.t3}}>No stock currently</div>:
      <div style={{padding:"12px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
          {[
            ["Total Stock Value",fm(active.reduce((a,c)=>a+c.price,0)),C.g,"at asking price"],
            ["Total Cost",fm(active.reduce((a,c)=>a+c.purchase+c.recon+(c.other||0),0)),C.a,"invested"],
            ["Potential Profit",fm(active.reduce((a,c)=>a+(c.price-c.purchase-c.recon-(c.other||0)),0)),C.g,"if all sold"],
            ["Avg Days in Stock",Math.round(active.reduce((a,c)=>a+dAgo(c.acq),0)/active.length)+"d",active.some(c=>dAgo(c.acq)>60)?C.r:C.a,"average age"],
          ].map(([l,v,col,sub])=><div key={l} style={{background:C.s2,borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>{l}</div>
            <div style={{fontSize:20,fontWeight:900,color:col,lineHeight:1}}>{v}</div>
            <div style={{fontSize:10,color:C.t4,marginTop:4}}>{sub}</div>
          </div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[
            {label:"Under 30 days",items:active.filter(c=>dAgo(c.acq)<=30),col:C.g},
            {label:"30–60 days",items:active.filter(c=>dAgo(c.acq)>30&&dAgo(c.acq)<=60),col:C.a},
            {label:"Over 60 days ⚠️",items:active.filter(c=>dAgo(c.acq)>60),col:C.r},
          ].map(({label,items,col})=><div key={label} style={{background:C.s2,borderRadius:9,padding:"11px 13px",border:`1px solid ${items.length>0&&col===C.r?C.rb:C.b1}`}}>
            <div style={{fontSize:11,color:col,fontWeight:700,marginBottom:6}}>{label}</div>
            <div style={{fontSize:22,fontWeight:900,color:col,marginBottom:6}}>{items.length}</div>
            {items.slice(0,3).map(c=><div key={c.id} style={{fontSize:11,color:C.t3,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.year} {c.make} {c.model}</div>)}
            {items.length>3&&<div style={{fontSize:10,color:C.t4}}>+{items.length-3} more</div>}
          </div>)}
        </div>
      </div>}
    </div>
  </div>;
}

function IntelApp(){
  const stock=JSON.parse(localStorage.getItem("lmct_stock")||"[]");
  const sold=JSON.parse(localStorage.getItem("lmct_sold")||"[]");
  return <MarketIntelligence stock={stock} sold={sold} ul={true} onReq={()=>{}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<IntelApp/>);
</script>
</body>
</html>
