<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LMCT PRO — Inventory Strategy Engine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#080810;color:#eef;min-height:100vh;padding:16px}
.toolbar{background:#0e0e1a;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 18px;display:flex;gap:12px;align-items:center;margin-bottom:16px;max-width:980px;margin-left:auto;margin-right:auto}
#root{max-width:980px;margin:0 auto}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="toolbar">
  <div style="font-weight:800;font-size:16px;letter-spacing:-.5px">LMCT<span style="color:#7c6fff">PRO</span></div>
  <div style="color:#9999b8;font-size:13px;flex:1">🧠 Inventory Strategy Engine</div>
  <button onclick="window.close()" style="padding:6px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#9999b8;cursor:pointer;font-size:12px;font-family:inherit">✕ Close</button>
</div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect}=React;
const fm=n=>"$"+(parseFloat(n)||0).toLocaleString("en-AU",{minimumFractionDigits:0,maximumFractionDigits:0});
const C={s1:"#0e0e1a",s2:"#141420",s3:"#1c1c2c",b1:"rgba(255,255,255,.05)",b2:"rgba(255,255,255,.09)",b3:"rgba(255,255,255,.16)",t1:"#eeeef8",t2:"#9999b8",t3:"#5f5f7a",t4:"#3a3a52",acc:"#7c6fff",acc2:"#a89dff",accd:"rgba(124,111,255,.12)",g:"#1fd97a",gd:"rgba(31,217,122,.1)",gb:"rgba(31,217,122,.2)",a:"#f5a623",ad:"rgba(245,166,35,.1)",ab:"rgba(245,166,35,.2)",r:"#ff4d4d",rd:"rgba(255,77,77,.1)",rb:"rgba(255,77,77,.2)",b:"#3d9eff"};
const dAgo=d=>d?Math.round((new Date()-new Date(d))/86400000):0;

function StrategyEngine(){
  const [stock]=useState(()=>{try{return JSON.parse(localStorage.getItem("lmct_stock")||"[]");}catch(e){return[];}});
  const [sold]=useState(()=>{try{return JSON.parse(localStorage.getItem("lmct_sold")||"[]");}catch(e){return[];}});
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const [lastRun,setLastRun]=useState(()=>localStorage.getItem("lmct_strategy_ts")||null);

  // Load cached result
  useEffect(()=>{
    try{
      const cached=localStorage.getItem("lmct_strategy_result");
      if(cached)setResult(JSON.parse(cached));
    }catch(e){}
  },[]);

  // ── BUILD FULL ANALYTICS ──
  function buildData(){
    const active=stock.filter(c=>c.status!=="Sold");

    // Days to sell per sold vehicle
    function dts(s){
      const match=stock.find(c=>(c.rego&&c.rego===s.rego)||(c.make===s.make&&c.model===s.model&&c.year===s.year));
      if(match&&match.acq&&s.date){const d=Math.round((new Date(s.date)-new Date(match.acq))/86400000);return d>0&&d<400?d:null;}
      return null;
    }

    // By body type
    const byBody={};
    sold.forEach(s=>{
      const match=stock.find(c=>(c.rego&&c.rego===s.rego)||(c.make===s.make&&c.model===s.model&&c.year===s.year));
      const body=match?.body||s.body||"Unknown";
      if(!byBody[body])byBody[body]={count:0,profit:0,revenue:0,dts:[]};
      byBody[body].count++;
      byBody[body].profit+=s.profit||0;
      byBody[body].revenue+=s.sale||0;
      const d=dts(s);if(d)byBody[body].dts.push(d);
    });

    // By make
    const byMake={};
    sold.forEach(s=>{
      if(!byMake[s.make])byMake[s.make]={count:0,profit:0,revenue:0,dts:[],prices:[]};
      byMake[s.make].count++;
      byMake[s.make].profit+=s.profit||0;
      byMake[s.make].revenue+=s.sale||0;
      byMake[s.make].prices.push(s.sale||0);
      const d=dts(s);if(d)byMake[s.make].dts.push(d);
    });

    // By price band
    const bands=[
      {label:"Under $15k",min:0,max:15000},
      {label:"$15k–$20k",min:15000,max:20000},
      {label:"$20k–$25k",min:20000,max:25000},
      {label:"$25k–$35k",min:25000,max:35000},
      {label:"Over $35k",min:35000,max:999999},
    ];
    const byBand=bands.map(b=>{
      const bsold=sold.filter(s=>s.sale>=b.min&&s.sale<b.max);
      const dtsList=bsold.map(s=>dts(s)).filter(Boolean);
      return{...b,count:bsold.length,
        avgDTS:dtsList.length?Math.round(dtsList.reduce((a,b)=>a+b,0)/dtsList.length):null,
        avgProfit:bsold.length?Math.round(bsold.reduce((a,s)=>a+(s.profit||0),0)/bsold.length):0,
      };
    });

    // By source
    const bySource={};
    sold.forEach(s=>{
      const match=stock.find(c=>(c.rego&&c.rego===s.rego)||(c.make===s.make&&c.model===s.model&&c.year===s.year));
      const src=match?.source||"Unknown";
      if(!bySource[src])bySource[src]={count:0,profit:0};
      bySource[src].count++;bySource[src].profit+=s.profit||0;
    });

    // Current stock issues
    const aged60=active.filter(c=>dAgo(c.acq)>60);
    const aged30=active.filter(c=>dAgo(c.acq)>30&&dAgo(c.acq)<=60);
    const regoRisk=active.filter(c=>c.regoExp&&Math.round((new Date(c.regoExp)-new Date())/86400000)<30);

    // Body type in stock vs what sells
    const stockByBody={};
    active.forEach(c=>{const b=c.body||"Unknown";if(!stockByBody[b])stockByBody[b]=0;stockByBody[b]++;});

    return {
      totalSold:sold.length,
      totalStock:active.length,
      totalRevenue:sold.reduce((a,s)=>a+s.sale,0),
      totalProfit:sold.reduce((a,s)=>a+(s.profit||0),0),
      byBody:Object.entries(byBody).map(([body,d])=>({body,count:d.count,avgProfit:d.count?Math.round(d.profit/d.count):0,avgDTS:d.dts.length?Math.round(d.dts.reduce((a,b)=>a+b,0)/d.dts.length):null,totalRevenue:d.revenue})).sort((a,b)=>b.count-a.count),
      byMake:Object.entries(byMake).map(([make,d])=>({make,count:d.count,avgProfit:d.count?Math.round(d.profit/d.count):0,avgDTS:d.dts.length?Math.round(d.dts.reduce((a,b)=>a+b,0)/d.dts.length):null,avgSale:d.prices.length?Math.round(d.prices.reduce((a,b)=>a+b,0)/d.prices.length):0})).sort((a,b)=>b.count-a.count),
      byBand,
      bySource:Object.entries(bySource).map(([src,d])=>({src,count:d.count,avgProfit:d.count?Math.round(d.profit/d.count):0})).sort((a,b)=>b.avgProfit-a.avgProfit),
      aged60:aged60.map(c=>({id:c.id,vehicle:`${c.year} ${c.make} ${c.model}`,days:dAgo(c.acq),price:c.price,body:c.body||""})),
      aged30:aged30.length,
      regoRisk:regoRisk.map(c=>({vehicle:`${c.year} ${c.make} ${c.model}`,rego:c.rego,daysLeft:Math.round((new Date(c.regoExp)-new Date())/86400000)})),
      stockByBody,
      currentStockValue:active.reduce((a,c)=>a+c.price,0),
      currentStockCost:active.reduce((a,c)=>a+c.purchase+c.recon+(c.other||0),0),
    };
  }

  async function runStrategy(){
    setLoading(true);setErr(null);
    const data=buildData();

    const prompt=`You are an expert automotive dealer inventory strategist for Victoria, Australia. You have deep knowledge of the used car market, dealer economics, and stock management.

Analyse this dealer's COMPLETE business data and provide a strategic inventory report.

DEALER PERFORMANCE DATA:
Total vehicles sold: ${data.totalSold}
Total revenue: $${data.totalRevenue.toLocaleString()} AUD
Total gross profit: $${data.totalProfit.toLocaleString()} AUD
Current stock: ${data.totalStock} vehicles (value $${data.currentStockValue.toLocaleString()}, cost $${data.currentStockCost.toLocaleString()})

SALES BY BODY TYPE:
${data.byBody.map(b=>`${b.body}: ${b.count} sold, avg profit $${b.avgProfit.toLocaleString()}, avg days to sell: ${b.avgDTS||"N/A"}`).join("\n")||"No data"}

SALES BY MAKE:
${data.byMake.map(m=>`${m.make}: ${m.count} sold, avg profit $${m.avgProfit.toLocaleString()}, avg sale $${m.avgSale.toLocaleString()}, avg days: ${m.avgDTS||"N/A"}`).join("\n")||"No data"}

SALES BY PRICE BAND:
${data.byBand.filter(b=>b.count>0).map(b=>`${b.label}: ${b.count} sold, avg profit $${b.avgProfit.toLocaleString()}, avg days: ${b.avgDTS||"N/A"}`).join("\n")||"No data"}

BEST STOCK SOURCES (by avg profit):
${data.bySource.map(s=>`${s.src}: ${s.count} sold, avg profit $${s.avgProfit.toLocaleString()}`).join("\n")||"No data"}

PROBLEM STOCK (60+ days):
${data.aged60.map(c=>`${c.vehicle}: ${c.days} days, listed at $${c.price.toLocaleString()}`).join("\n")||"None"}

REGO EXPIRY RISKS:
${data.regoRisk.map(r=>`${r.vehicle} (${r.rego}): ${r.daysLeft} days left`).join("\n")||"None"}

CURRENT STOCK MIX:
${Object.entries(data.stockByBody).map(([b,n])=>`${b}: ${n} vehicles`).join(", ")||"No stock"}

Provide a strategic inventory report in this EXACT JSON format (raw JSON only, no markdown):
{
  "verdict": "one punchy sentence verdict on their inventory strategy e.g. 'You are over-invested in SUVs that sit 45+ days — your money is in sedans and hatchbacks'",
  "overallScore": <1-100 inventory efficiency score>,
  "scoreLabel": "<Critical|Poor|Fair|Good|Strong|Optimised>",
  "buyMore": [
    {"type": "body type or make", "reason": "specific reason from their data e.g. 'Sedans sell in 18 days avg for you vs 45 for SUVs'", "targetPrice": "price range to target e.g. $18,000–$24,000", "priority": "High|Medium"},
    ... 2-4 items
  ],
  "stopBuying": [
    {"type": "body type or make", "reason": "specific data-backed reason", "action": "what to do with existing stock of this type"},
    ... 1-3 items
  ],
  "fixNow": [
    {"vehicle": "year make model", "issue": "e.g. 67 days in stock", "action": "specific recommended price drop or action e.g. 'Drop to $29,990 — you are $4k above market for this age'", "urgency": "Urgent|High|Medium"},
    ... for each aged 60+ day vehicle
  ],
  "priceInsight": "one specific insight about their optimal price band e.g. 'Your sweet spot is $18k-$24k — these sell in 21 days avg and deliver $3,800 avg profit'",
  "sourceStrategy": "one specific recommendation on where to source stock e.g. 'Focus on auctions — they deliver 40% higher margins than trade-ins for you'",
  "monthlyTarget": {"units": <recommended monthly sales target>, "stockLevel": <recommended stock level to maintain>, "reason": "brief explanation"}
}`;

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1500,
          messages:[{role:"user",content:prompt}]
        })
      });
      const d=await res.json();
      const text=d.content?.find(b=>b.type==="text")?.text||"";
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setResult(parsed);
      const ts=new Date().toLocaleString("en-AU");
      setLastRun(ts);
      localStorage.setItem("lmct_strategy_result",JSON.stringify(parsed));
      localStorage.setItem("lmct_strategy_ts",ts);
    }catch(e){
      setErr("Strategy analysis failed. Check your connection and try again.");
    }
    setLoading(false);
  }

  const scoreCol=s=>s>=80?C.g:s>=60?C.a:s>=40?"#ff9944":C.r;
  const priorityCol=p=>p==="High"?C.r:p==="Medium"?C.a:C.g;
  const urgencyCol=u=>u==="Urgent"?C.r:u==="High"?C.a:C.g;
  const data=buildData();

  return <div>
    {/* Hero header */}
    <div style={{background:"linear-gradient(135deg,rgba(124,111,255,.18),rgba(255,77,77,.08),rgba(31,217,122,.06))",border:`1px solid rgba(124,111,255,.25)`,borderRadius:16,padding:"22px 26px",marginBottom:20}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:52,height:52,borderRadius:14,background:"rgba(124,111,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>🧠</div>
          <div>
            <div style={{fontSize:22,fontWeight:900,letterSpacing:-.5}}>Inventory Strategy Engine</div>
            <div style={{fontSize:13,color:C.t3,marginTop:4,lineHeight:1.5}}>AI analyses your complete sales history to tell you exactly what to buy, what to avoid, and what to do with slow stock.</div>
            {lastRun&&<div style={{fontSize:11,color:C.t4,marginTop:4}}>Last run: {lastRun}</div>}
          </div>
        </div>
        <button onClick={runStrategy} disabled={loading} style={{padding:"12px 24px",background:loading?"rgba(124,111,255,.2)":"rgba(124,111,255,1)",border:"none",borderRadius:10,color:"white",fontWeight:800,fontSize:14,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:8,flexShrink:0,transition:"all .2s"}}>
          {loading?<div style={{width:16,height:16,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"white",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>:"🧠"}
          {loading?"Analysing...":"Run Strategy Analysis"}
        </button>
      </div>

      {/* Quick stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginTop:18}}>
        {[["Total Sold",data.totalSold,C.g],["In Stock",data.totalStock,C.b],["Revenue",fm(data.totalRevenue),C.g],["Aged 60+ Days",data.aged60.length,data.aged60.length>0?C.r:C.g]].map(([l,v,col])=>
          <div key={l} style={{background:"rgba(0,0,0,.2)",borderRadius:10,padding:"11px 14px",backdropFilter:"blur(10px)"}}>
            <div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>{l}</div>
            <div style={{fontSize:20,fontWeight:900,color:col}}>{v}</div>
          </div>
        )}
      </div>
    </div>

    {/* Loading */}
    {loading&&<div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:14,padding:"32px 24px",textAlign:"center",marginBottom:16}}>
      <div style={{width:44,height:44,border:`3px solid ${C.accd}`,borderTopColor:C.acc,borderRadius:"50%",margin:"0 auto 16px",animation:"spin .8s linear infinite"}}/>
      <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Analysing your inventory strategy...</div>
      <div style={{display:"flex",flexDirection:"column",gap:6,maxWidth:360,margin:"0 auto",marginTop:14}}>
        {["Reading body type performance...","Calculating days-to-sell by category...","Comparing stock mix vs what sells...","Identifying slow movers to action...","Building buy/avoid recommendations..."].map((t,i)=>
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.t3}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:C.acc,animation:`pulse 1s ${i*.15}s infinite`,flexShrink:0}}/>
            {t}
          </div>
        )}
      </div>
    </div>}

    {/* Error */}
    {err&&<div style={{background:C.rd,border:`1px solid ${C.rb}`,borderRadius:10,padding:"14px 18px",color:C.r,marginBottom:16}}>⚠️ {err}</div>}

    {/* ── RESULTS ── */}
    {result&&<div style={{animation:"slideIn .4s ease"}}>

      {/* VERDICT + SCORE */}
      <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:14,marginBottom:14}}>
        <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:14,padding:"20px 22px"}}>
          <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:.7,marginBottom:10}}>Strategy Verdict</div>
          <div style={{fontSize:17,fontWeight:700,color:C.t1,lineHeight:1.5}}>{result.verdict}</div>
        </div>
        <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:14,padding:"20px 22px",textAlign:"center",minWidth:140}}>
          <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:.7,marginBottom:8}}>Inventory Score</div>
          <div style={{fontSize:52,fontWeight:900,color:scoreCol(result.overallScore),lineHeight:1}}>{result.overallScore}</div>
          <div style={{fontSize:13,fontWeight:700,color:scoreCol(result.overallScore),marginTop:4}}>{result.scoreLabel}</div>
        </div>
      </div>

      {/* BUY MORE + STOP BUYING — side by side */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>

        {/* BUY MORE */}
        <div style={{background:C.s1,border:`1px solid ${C.gb}`,borderRadius:14,overflow:"hidden"}}>
          <div style={{background:"rgba(31,217,122,.08)",padding:"13px 18px",borderBottom:`1px solid ${C.gb}`,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>✅</span>
            <div>
              <div style={{fontWeight:800,fontSize:14,color:C.g}}>BUY MORE OF THESE</div>
              <div style={{fontSize:11,color:C.t3,marginTop:1}}>Stock that sells fast and makes you money</div>
            </div>
          </div>
          <div style={{padding:"10px 0"}}>
            {(result.buyMore||[]).map((item,i)=><div key={i} style={{padding:"13px 18px",borderBottom:`1px solid ${C.b1}`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{fontSize:15,fontWeight:800,color:C.t1}}>{item.type}</div>
                <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,background:item.priority==="High"?"rgba(255,77,77,.15)":"rgba(245,166,35,.12)",color:item.priority==="High"?C.r:C.a}}>{item.priority} Priority</span>
              </div>
              <div style={{fontSize:12,color:C.t2,lineHeight:1.6,marginBottom:8}}>{item.reason}</div>
              {item.targetPrice&&<div style={{display:"inline-flex",alignItems:"center",gap:5,background:C.gd,border:`1px solid ${C.gb}`,borderRadius:7,padding:"3px 10px"}}>
                <span style={{fontSize:11,color:C.g,fontWeight:700}}>🎯 Target: {item.targetPrice}</span>
              </div>}
            </div>)}
          </div>
        </div>

        {/* STOP BUYING */}
        <div style={{background:C.s1,border:`1px solid ${C.rb}`,borderRadius:14,overflow:"hidden"}}>
          <div style={{background:"rgba(255,77,77,.08)",padding:"13px 18px",borderBottom:`1px solid ${C.rb}`,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>🛑</span>
            <div>
              <div style={{fontWeight:800,fontSize:14,color:C.r}}>STOP BUYING THESE</div>
              <div style={{fontSize:11,color:C.t3,marginTop:1}}>Slow movers that tie up your cash</div>
            </div>
          </div>
          <div style={{padding:"10px 0"}}>
            {(result.stopBuying||[]).map((item,i)=><div key={i} style={{padding:"13px 18px",borderBottom:`1px solid ${C.b1}`}}>
              <div style={{fontSize:15,fontWeight:800,color:C.t1,marginBottom:6}}>{item.type}</div>
              <div style={{fontSize:12,color:C.t2,lineHeight:1.6,marginBottom:8}}>{item.reason}</div>
              {item.action&&<div style={{background:C.s2,borderRadius:8,padding:"8px 11px",fontSize:11,color:C.a,border:`1px solid ${C.ab}`}}>
                <strong>Action:</strong> {item.action}
              </div>}
            </div>)}
          </div>
        </div>
      </div>

      {/* FIX NOW — aged stock actions */}
      {result.fixNow&&result.fixNow.length>0&&<div style={{background:C.s1,border:`1px solid ${C.ab}`,borderRadius:14,overflow:"hidden",marginBottom:14}}>
        <div style={{background:"rgba(245,166,35,.08)",padding:"13px 18px",borderBottom:`1px solid ${C.ab}`,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>⚡</span>
          <div>
            <div style={{fontWeight:800,fontSize:14,color:C.a}}>FIX NOW — Slow Stock Action Plan</div>
            <div style={{fontSize:11,color:C.t3,marginTop:1}}>Vehicles sitting too long — specific actions to move them today</div>
          </div>
        </div>
        <div style={{padding:"8px 0"}}>
          {result.fixNow.map((item,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"13px 18px",borderBottom:`1px solid ${C.b1}`}}>
            <div style={{width:28,height:28,borderRadius:8,background:urgencyCol(item.urgency)==C.r?C.rd:urgencyCol(item.urgency)==C.a?C.ad:C.gd,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,marginTop:2}}>
              {item.urgency==="Urgent"?"🚨":item.urgency==="High"?"⚠️":"📌"}
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontSize:14,fontWeight:700,color:C.t1}}>{item.vehicle}</span>
                <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:8,background:urgencyCol(item.urgency)==C.r?C.rd:urgencyCol(item.urgency)==C.a?C.ad:C.gd,color:urgencyCol(item.urgency)}}>{item.urgency}</span>
              </div>
              <div style={{fontSize:12,color:C.a,marginBottom:6}}>⏱ {item.issue}</div>
              <div style={{background:C.s2,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.t1,border:`1px solid ${C.b2}`,lineHeight:1.5}}>
                <strong style={{color:C.g}}>Recommended action:</strong> {item.action}
              </div>
            </div>
          </div>)}
        </div>
      </div>}

      {/* PRICE INSIGHT + SOURCE STRATEGY */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <div style={{background:C.s1,border:`1px solid rgba(124,111,255,.2)`,borderRadius:12,padding:"16px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:18}}>💰</span>
            <div style={{fontSize:13,fontWeight:700,color:C.acc2}}>OPTIMAL PRICE BAND</div>
          </div>
          <div style={{fontSize:13,color:C.t1,lineHeight:1.65}}>{result.priceInsight}</div>
        </div>
        <div style={{background:C.s1,border:`1px solid rgba(124,111,255,.2)`,borderRadius:12,padding:"16px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:18}}>📦</span>
            <div style={{fontSize:13,fontWeight:700,color:C.acc2}}>SOURCING STRATEGY</div>
          </div>
          <div style={{fontSize:13,color:C.t1,lineHeight:1.65}}>{result.sourceStrategy}</div>
        </div>
      </div>

      {/* MONTHLY TARGET */}
      {result.monthlyTarget&&<div style={{background:"linear-gradient(135deg,rgba(124,111,255,.1),rgba(31,217,122,.06))",border:`1px solid rgba(124,111,255,.2)`,borderRadius:14,padding:"18px 22px",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <span style={{fontSize:18}}>🎯</span>
          <div style={{fontSize:14,fontWeight:800}}>Monthly Targets</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
          <div style={{background:"rgba(0,0,0,.2)",borderRadius:10,padding:"13px 16px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Monthly Sales Target</div>
            <div style={{fontSize:32,fontWeight:900,color:C.g}}>{result.monthlyTarget.units}</div>
            <div style={{fontSize:10,color:C.t4,marginTop:3}}>units per month</div>
          </div>
          <div style={{background:"rgba(0,0,0,.2)",borderRadius:10,padding:"13px 16px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.t3,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Recommended Stock Level</div>
            <div style={{fontSize:32,fontWeight:900,color:C.b}}>{result.monthlyTarget.stockLevel}</div>
            <div style={{fontSize:10,color:C.t4,marginTop:3}}>vehicles to maintain</div>
          </div>
          <div style={{background:"rgba(0,0,0,.2)",borderRadius:10,padding:"13px 16px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{fontSize:12,color:C.t2,lineHeight:1.6}}>{result.monthlyTarget.reason}</div>
          </div>
        </div>
      </div>}

      <div style={{textAlign:"center",fontSize:11,color:C.t4,padding:"8px 0"}}>
        Strategy generated {lastRun} · Based on {data.totalSold} sales · Re-run monthly or after major stock changes
      </div>
    </div>}

    {/* Empty state */}
    {!result&&!loading&&!err&&<div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:14,padding:"40px 24px",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:16}}>🧠</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Ready to analyse your inventory strategy</div>
      <div style={{fontSize:13,color:C.t3,marginBottom:24,maxWidth:500,margin:"0 auto 24px",lineHeight:1.7}}>
        Click "Run Strategy Analysis" and the AI will analyse your complete sales history to tell you exactly what to buy, what to stop buying, and what to do with your slow stock — all based on your own data.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,maxWidth:600,margin:"0 auto 28px"}}>
        {[["🛒","Buy Recommendations","What to source more of and at what price"],["🛑","Stop Buying List","What's draining your cash and why"],["⚡","Fix Now Actions","Specific price drops for aged stock"]].map(([ic,t,d])=>
          <div key={t} style={{background:C.s2,borderRadius:10,padding:"14px 12px",textAlign:"left"}}>
            <div style={{fontSize:22,marginBottom:6}}>{ic}</div>
            <div style={{fontSize:12,fontWeight:700,marginBottom:4}}>{t}</div>
            <div style={{fontSize:11,color:C.t3,lineHeight:1.5}}>{d}</div>
          </div>
        )}
      </div>
      <button onClick={runStrategy} style={{padding:"13px 32px",background:C.acc,border:"none",borderRadius:10,color:"white",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
        🧠 Run Strategy Analysis
      </button>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<StrategyEngine/>);
</script>
</body>
</html>
