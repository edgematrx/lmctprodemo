<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LMCT PRO — Task Board</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#080810;color:#eef;min-height:100vh;padding:16px}
.toolbar{background:#0e0e1a;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 18px;display:flex;gap:12px;align-items:center;margin-bottom:16px;max-width:820px;margin-left:auto;margin-right:auto}
#root{max-width:820px;margin:0 auto}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
</style>
</head>
<body>
<div class="toolbar">
  <div style="font-weight:800;font-size:16px;letter-spacing:-.5px">LMCT<span style="color:#7c6fff">PRO</span></div>
  <div style="color:#9999b8;font-size:13px;flex:1">☀️ Task Board — " + new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"}) + "</div>
  <button onclick="window.close()" style="padding:6px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#9999b8;cursor:pointer;font-size:12px;font-family:inherit">✕ Close</button>
</div>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">

const {useState,useEffect,useRef}=React;
const fm=n=>"$"+(parseFloat(n)||0).toLocaleString("en-AU",{minimumFractionDigits:0,maximumFractionDigits:0});
const fd=d=>{if(!d)return"—";try{return new Date(d).toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"});}catch{return d;}};
const dAgo=d=>d?Math.round((new Date()-new Date(d))/86400000):0;
const dUntil=d=>d?Math.round((new Date(d)-new Date())/86400000):999;
const C={bg:"#080810",s1:"#0e0e1a",s2:"#141420",s3:"#1c1c2c",s4:"#222234",b1:"rgba(255,255,255,.05)",b2:"rgba(255,255,255,.09)",b3:"rgba(255,255,255,.16)",t1:"#eeeef8",t2:"#9999b8",t3:"#5f5f7a",t4:"#3a3a52",acc:"#7c6fff",acc2:"#a89dff",accd:"rgba(124,111,255,.12)",g:"#1fd97a",gd:"rgba(31,217,122,.1)",gb:"rgba(31,217,122,.2)",a:"#f5a623",ad:"rgba(245,166,35,.1)",ab:"rgba(245,166,35,.2)",r:"#ff4d4d",rd:"rgba(255,77,77,.1)",rb:"rgba(255,77,77,.2)",b:"#3d9eff",bd:"rgba(61,158,255,.1)",bb:"rgba(61,158,255,.2)"};

// ── TODAY'S TASKS ──
function TodaysTasks({stock,cust,ul}){
  const TODAY=new Date().toISOString().split("T")[0];
  const SK="lmct_tasks_"+TODAY;
  const AGENTS_SK="lmct_agents";

  // Load agents
  function loadAgents(){
    try{return JSON.parse(localStorage.getItem(AGENTS_SK)||'["Manager","Sam","Alex","Jordan"]');}
    catch(e){return["Manager","Sam","Alex","Jordan"];}
  }
  function saveAgents(a){try{localStorage.setItem(AGENTS_SK,JSON.stringify(a));}catch(e){}}

  // Load tasks
  function loadTasks(){
    try{
      const raw=localStorage.getItem(SK);
      if(raw)return JSON.parse(raw);
      const auto=[];
      const active=stock.filter(c=>c.status!=="Sold");
      const aged=active.filter(c=>dAgo(c.acq)>45).slice(0,2);
      aged.forEach(c=>auto.push({id:Date.now()+Math.random(),text:`Reprice ${c.year} ${c.make} ${c.model} — ${dAgo(c.acq)} days in stock`,done:false,type:"reprice",auto:true,assignee:"",completedBy:"",completedAt:"",note:""}));
      const leads=cust.filter(c=>c.status==="Hot Lead").slice(0,2);
      leads.forEach(c=>auto.push({id:Date.now()+Math.random(),text:`Follow up ${c.first} ${c.last} — ${c.phone||"no phone"}`,done:false,type:"followup",auto:true,assignee:"",completedBy:"",completedAt:"",note:""}));
      const expiring=active.filter(c=>c.regoExp&&dUntil(c.regoExp)>0&&dUntil(c.regoExp)<=14).slice(0,1);
      expiring.forEach(c=>auto.push({id:Date.now()+Math.random(),text:`Renew rego — ${c.year} ${c.make} ${c.model} expires in ${dUntil(c.regoExp)}d`,done:false,type:"rego",auto:true,assignee:"",completedBy:"",completedAt:"",note:""}));
      if(active.length<3)auto.push({id:Date.now()+Math.random(),text:"Stock is low — source and add vehicles today",done:false,type:"stock",auto:true,assignee:"",completedBy:"",completedAt:"",note:""});
      if(!auto.length)auto.push({id:Date.now()+Math.random(),text:"Upload new stock photos to CarSales",done:false,type:"general",auto:true,assignee:"",completedBy:"",completedAt:"",note:""});
      return auto;
    }catch(e){return[];}
  }

  const [tasks,setTasks]=useState(loadTasks);
  const [agents,setAgents]=useState(loadAgents);
  const [newTask,setNewTask]=useState("");
  const [newAssignee,setNewAssignee]=useState("");
  const [adding,setAdding]=useState(false);
  const [view,setView]=useState("all"); // "all"|"mine"|"manager"
  const [myName,setMyName]=useState(()=>localStorage.getItem("lmct_myname")||"");
  const [showNamePick,setShowNamePick]=useState(false);
  const [completingId,setCompletingId]=useState(null);
  const [completingNote,setCompletingNote]=useState("");
  const [showManage,setShowManage]=useState(false);
  const [newAgent,setNewAgent]=useState("");
  const inputRef=React.useRef();

  function save(t){setTasks(t);try{localStorage.setItem(SK,JSON.stringify(t));}catch(e){}}
  function setMyNameAndSave(n){setMyName(n);localStorage.setItem("lmct_myname",n);}

  function addTask(){
    const txt=newTask.trim();
    if(!txt)return;
    save([...tasks,{id:Date.now(),text:txt,done:false,type:"manual",auto:false,assignee:newAssignee,completedBy:"",completedAt:"",note:"",createdBy:myName||"Manager"}]);
    setNewTask("");setNewAssignee("");setAdding(false);
  }

  function startComplete(id){
    setCompletingId(id);setCompletingNote("");
  }

  function confirmComplete(id){
    const who=myName||"Staff";
    const now=new Date().toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit",hour12:true});
    save(tasks.map(t=>t.id===id?{...t,done:true,completedBy:who,completedAt:now,note:completingNote}:t));
    setCompletingId(null);setCompletingNote("");
  }

  function uncomplete(id){save(tasks.map(t=>t.id===id?{...t,done:false,completedBy:"",completedAt:"",note:""}:t));}
  function remove(id){save(tasks.filter(t=>t.id!==id));}

  function addAgent(){if(newAgent.trim()&&!agents.includes(newAgent.trim())){const a=[...agents,newAgent.trim()];setAgents(a);saveAgents(a);setNewAgent("");}}
  function removeAgent(n){const a=agents.filter(x=>x!==n);setAgents(a);saveAgents(a);}

  const done=tasks.filter(t=>t.done).length;
  const total=tasks.length;
  const pct=total?Math.round((done/total)*100):0;
  const typeIcon=t=>({reprice:"💰",rego:"📋",followup:"📞",stock:"🚗",general:"✅",manual:"📌"}[t]||"📌");

  // Filter tasks by view
  const visibleTasks=view==="mine"&&myName?tasks.filter(t=>t.assignee===myName||(!t.assignee&&!t.done)):
    view==="manager"?tasks:tasks;

  // Group by agent for manager view
  const byAgent={};
  if(view==="manager"){
    tasks.forEach(t=>{const k=t.assignee||"Unassigned";if(!byAgent[k])byAgent[k]=[];byAgent[k].push(t);});
  }

  return <div style={{background:C.s1,border:`1px solid ${C.b1}`,borderRadius:14,overflow:"hidden",marginBottom:14}}>

    {/* Header */}
    <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.b1}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:18}}>☀️</span>
        <div>
          <div style={{fontWeight:800,fontSize:14}}>Today's Tasks</div>
          <div style={{fontSize:11,color:C.t3,marginTop:1}}>{new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"})}</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        {/* Progress */}
        {total>0&&<div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:70,height:5,background:C.s3,borderRadius:3,overflow:"hidden"}}>
            <div style={{width:pct+"%",height:"100%",background:pct===100?C.g:C.acc,borderRadius:3,transition:"width .4s"}}/>
          </div>
          <span style={{fontSize:11,fontWeight:700,color:pct===100?C.g:C.t3}}>{done}/{total}</span>
        </div>}

        {/* Who am I — staff picks their name */}
        <div onClick={()=>setShowNamePick(p=>!p)} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 9px",background:myName?C.accd:C.s2,border:`1px solid ${myName?"rgba(124,111,255,.25)":C.b2}`,borderRadius:7,cursor:"pointer",fontSize:12,color:myName?C.acc2:C.t3,fontWeight:myName?600:400}}>
          👤 {myName||"Who am I?"}
        </div>

        {/* View tabs */}
        <div style={{display:"flex",background:C.s2,borderRadius:7,border:`1px solid ${C.b1}`,overflow:"hidden"}}>
          {[["all","All"],["mine","Mine"],ul&&["manager","Manager View"]].filter(Boolean).map(([v,l])=>
            <button key={v} onClick={()=>setView(v)} style={{padding:"5px 10px",border:"none",background:v===view?C.s4:"transparent",color:v===view?C.t1:C.t3,fontSize:11,fontWeight:v===view?700:400,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
          )}
        </div>

        {/* Add task — manager only */}
        {ul&&<button onClick={()=>{setAdding(true);setTimeout(()=>inputRef.current&&inputRef.current.focus(),50);}} style={{padding:"5px 11px",background:C.accd,border:`1px solid rgba(124,111,255,.25)`,borderRadius:7,color:C.acc2,fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>+ Add Task</button>}
      </div>
    </div>

    {/* Who am I picker */}
    {showNamePick&&<div style={{padding:"12px 16px",borderBottom:`1px solid ${C.b1}`,background:C.s2}}>
      <div style={{fontSize:12,color:C.t3,marginBottom:8}}>Select your name — tasks assigned to you will be highlighted</div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
        {agents.map(n=><button key={n} onClick={()=>{setMyNameAndSave(n);setShowNamePick(false);}} style={{padding:"6px 13px",background:myName===n?C.accd:C.s3,border:`1px solid ${myName===n?"rgba(124,111,255,.3)":C.b2}`,borderRadius:20,color:myName===n?C.acc2:C.t2,fontWeight:myName===n?700:400,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{n}</button>)}
        <button onClick={()=>{setMyNameAndSave("");setShowNamePick(false);}} style={{padding:"6px 13px",background:C.s3,border:`1px solid ${C.b1}`,borderRadius:20,color:C.t4,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Clear</button>
      </div>
      {ul&&<button onClick={()=>setShowManage(p=>!p)} style={{marginTop:8,background:"none",border:"none",color:C.t4,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>⚙️ Manage team members</button>}
      {ul&&showManage&&<div style={{marginTop:10,display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
        <input value={newAgent} onChange={e=>setNewAgent(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addAgent()} placeholder="Add team member name..." style={{background:C.s3,border:`1px solid ${C.b2}`,borderRadius:7,padding:"5px 9px",color:C.t1,fontSize:12,fontFamily:"inherit",outline:"none",flex:1,minWidth:150}}/>
        <button onClick={addAgent} style={{padding:"5px 11px",background:C.acc,border:"none",borderRadius:7,color:"white",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Add</button>
        {agents.map(n=><div key={n} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 9px",background:C.s3,border:`1px solid ${C.b1}`,borderRadius:20,fontSize:11,color:C.t2}}>{n}<button onClick={()=>removeAgent(n)} style={{background:"none",border:"none",color:C.t4,cursor:"pointer",fontSize:12,padding:0,lineHeight:1}}>✕</button></div>)}
      </div>}
    </div>}

    {/* All done banner */}
    {total>0&&pct===100&&<div style={{background:"rgba(31,217,122,.08)",borderBottom:`1px solid ${C.gb}`,padding:"10px 18px",display:"flex",alignItems:"center",gap:8}}>
      <span>🎉</span><span style={{fontSize:13,fontWeight:600,color:C.g}}>All tasks completed! Great work team.</span>
    </div>}

    {/* ── MANAGER VIEW — grouped by agent ── */}
    {view==="manager"&&ul&&<div style={{padding:"10px 0"}}>
      {Object.keys(byAgent).length===0&&<div style={{padding:"20px",textAlign:"center",color:C.t3,fontSize:13}}>No tasks yet. Add tasks and assign them to team members.</div>}
      {Object.entries(byAgent).map(([agent,agentTasks])=>{
        const adone=agentTasks.filter(t=>t.done).length;
        return <div key={agent} style={{marginBottom:4}}>
          {/* Agent header */}
          <div style={{padding:"8px 16px",background:C.s2,display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${C.b1}`,borderTop:`1px solid ${C.b1}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:C.accd,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:C.acc2}}>{agent[0]}</div>
              <span style={{fontWeight:700,fontSize:13}}>{agent}</span>
              <span style={{fontSize:11,color:C.t3}}>{adone}/{agentTasks.length} done</span>
            </div>
            <div style={{display:"flex",gap:4}}>
              {agentTasks.filter(t=>t.done).map(t=><div key={t.id} title={t.text} style={{width:8,height:8,borderRadius:"50%",background:C.g}}/>)}
              {agentTasks.filter(t=>!t.done).map(t=><div key={t.id} title={t.text} style={{width:8,height:8,borderRadius:"50%",background:C.b2}}/>)}
            </div>
          </div>
          {/* Agent tasks */}
          {agentTasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 16px 9px 40px",borderBottom:`1px solid ${C.b1}`,background:t.done?"transparent":C.s1}}>
            <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${t.done?C.g:C.b2}`,background:t.done?C.g:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
              {t.done&&<svg width="9" height="7" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#080810" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,color:t.done?C.t4:C.t1,textDecoration:t.done?"line-through":"none"}}>{typeIcon(t.type)} {t.text}</div>
              {t.done&&<div style={{fontSize:11,color:C.g,marginTop:3,display:"flex",gap:8,flexWrap:"wrap"}}>
                <span>✅ Completed by <strong>{t.completedBy}</strong> at {t.completedAt}</span>
                {t.note&&<span style={{color:C.t3}}>· Note: "{t.note}"</span>}
              </div>}
            </div>
            {ul&&<button onClick={()=>remove(t.id)} style={{background:"none",border:"none",color:C.t4,cursor:"pointer",fontSize:13,padding:"0 2px",flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color=C.r} onMouseLeave={e=>e.currentTarget.style.color=C.t4}>✕</button>}
          </div>)}
        </div>;
      })}
    </div>}

    {/* ── NORMAL TASK LIST (All / Mine) ── */}
    {view!=="manager"&&<div style={{padding:"6px 0"}}>
      {visibleTasks.length===0&&!adding&&<div style={{padding:"20px 18px",textAlign:"center",color:C.t3,fontSize:13}}>
        {view==="mine"&&myName?`No tasks assigned to ${myName} today.`:"No tasks today."}
      </div>}

      {visibleTasks.map(t=>{
        const isAssignedToMe=myName&&t.assignee===myName;
        const isCompleting=completingId===t.id;
        return <div key={t.id}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 16px",borderBottom:isCompleting?`none`:`1px solid ${C.b1}`,background:isAssignedToMe&&!t.done?"rgba(124,111,255,.04)":t.done?"transparent":C.s1,transition:"background .15s",borderLeft:isAssignedToMe&&!t.done?`3px solid ${C.acc}`:"3px solid transparent"}}>

            {/* Checkbox / Complete button */}
            {t.done?
              <div onClick={()=>ul&&uncomplete(t.id)} style={{width:20,height:20,borderRadius:6,border:`2px solid ${C.g}`,background:C.g,display:"flex",alignItems:"center",justifyContent:"center",cursor:ul?"pointer":"default",flexShrink:0,marginTop:1}}>
                <svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#080810" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>:
              <div onClick={()=>!t.done&&startComplete(t.id)} style={{width:20,height:20,borderRadius:6,border:`2px solid ${isAssignedToMe?C.acc:C.b2}`,background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,marginTop:1,transition:"all .15s"}}/>
            }

            {/* Type icon */}
            <span style={{fontSize:13,flexShrink:0,marginTop:1}}>{typeIcon(t.type)}</span>

            {/* Task content */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,color:t.done?C.t4:C.t1,textDecoration:t.done?"line-through":"none",lineHeight:1.4}}>{t.text}</div>
              <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap",alignItems:"center"}}>
                {t.assignee&&<span style={{fontSize:10,fontWeight:600,color:isAssignedToMe?C.acc2:C.t3,background:isAssignedToMe?C.accd:"transparent",padding:isAssignedToMe?"1px 6px":"0",borderRadius:10}}>👤 {t.assignee}</span>}
                {t.auto&&!t.done&&<span style={{fontSize:10,color:C.a,fontWeight:600}}>AI suggested</span>}
                {t.done&&<span style={{fontSize:10,color:C.g}}>✅ {t.completedBy} · {t.completedAt}</span>}
                {t.done&&t.note&&<span style={{fontSize:10,color:C.t3}}>"{t.note}"</span>}
              </div>
            </div>

            {/* Assign — manager only */}
            {ul&&!t.done&&<select value={t.assignee||""} onChange={e=>save(tasks.map(x=>x.id===t.id?{...x,assignee:e.target.value}:x))} style={{background:C.s2,border:`1px solid ${C.b2}`,borderRadius:6,padding:"3px 7px",color:t.assignee?C.t1:C.t3,fontSize:11,fontFamily:"inherit",outline:"none",maxWidth:90}}>
              <option value="">Assign...</option>
              {agents.map(a=><option key={a} value={a}>{a}</option>)}
            </select>}

            {/* Delete — manager only */}
            {ul&&<button onClick={()=>remove(t.id)} style={{background:"none",border:"none",color:C.t4,cursor:"pointer",fontSize:13,padding:"0 2px",flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color=C.r} onMouseLeave={e=>e.currentTarget.style.color=C.t4}>✕</button>}
          </div>

          {/* Complete with note panel */}
          {isCompleting&&<div style={{padding:"10px 16px",borderBottom:`1px solid ${C.b1}`,background:"rgba(31,217,122,.04)",border:`1px solid ${C.gb}`,borderRadius:8,margin:"0 10px 6px"}}>
            <div style={{fontSize:12,fontWeight:600,color:C.g,marginBottom:8}}>✅ Mark as complete</div>
            <input value={completingNote} onChange={e=>setCompletingNote(e.target.value)} placeholder="Add a completion note (optional) — e.g. 'Called Michael, booked for Thursday'" style={{width:"100%",background:C.s2,border:`1px solid ${C.b2}`,borderRadius:7,padding:"7px 11px",color:C.t1,fontSize:12,fontFamily:"inherit",outline:"none",marginBottom:8}} onKeyDown={e=>e.key==="Enter"&&confirmComplete(t.id)}/>
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>confirmComplete(t.id)} style={{padding:"6px 14px",background:C.g,border:"none",borderRadius:7,color:"#080810",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✅ Confirm Done</button>
              <button onClick={()=>setCompletingId(null)} style={{padding:"6px 12px",background:C.s2,border:`1px solid ${C.b2}`,borderRadius:7,color:C.t3,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
            </div>
          </div>}
        </div>;
      })}

      {/* Add task form — manager only */}
      {adding&&ul&&<div style={{padding:"12px 16px",borderBottom:`1px solid ${C.b1}`,background:C.s2}}>
        <div style={{fontSize:12,fontWeight:600,color:C.t2,marginBottom:8}}>New Task</div>
        <input ref={inputRef} value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addTask();if(e.key==="Escape"){setAdding(false);setNewTask("");}}} placeholder="e.g. Follow up John Smith re 2020 Mazda CX-5" style={{width:"100%",background:C.s3,border:`1px solid ${C.acc}`,borderRadius:7,padding:"8px 11px",color:C.t1,fontSize:13,fontFamily:"inherit",outline:"none",marginBottom:8}}/>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={newAssignee} onChange={e=>setNewAssignee(e.target.value)} style={{background:C.s3,border:`1px solid ${C.b2}`,borderRadius:7,padding:"7px 10px",color:C.t1,fontSize:12,fontFamily:"inherit",outline:"none",flex:1}}>
            <option value="">Assign to... (optional)</option>
            {agents.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
          <button onClick={addTask} style={{padding:"7px 16px",background:C.acc,border:"none",borderRadius:7,color:"white",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Add Task</button>
          <button onClick={()=>{setAdding(false);setNewTask("");setNewAssignee("");}} style={{padding:"7px 11px",background:C.s3,border:`1px solid ${C.b2}`,borderRadius:7,color:C.t3,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
        </div>
      </div>}
    </div>}

    {/* Quick add row — manager only */}
    {!adding&&ul&&view!=="manager"&&<div style={{padding:"9px 16px",display:"flex",gap:6,flexWrap:"wrap",borderTop:`1px solid ${C.b1}`,alignItems:"center"}}>
      <span style={{fontSize:11,color:C.t4,marginRight:2,alignSelf:"center"}}>Quick:</span>
      {[["📞 Follow up lead","followup"],["🚗 Upload stock","stock"],["💰 Reprice vehicle","reprice"],["📋 Lodge VicRoads form","rego"],["📸 Listing photos","general"]].map(([label,type])=>
        <button key={label} onClick={()=>save([...tasks,{id:Date.now(),text:label.substring(3),done:false,type,auto:false,assignee:"",completedBy:"",completedAt:"",note:"",createdBy:myName||"Manager"}])} style={{padding:"4px 9px",background:C.s2,border:`1px solid ${C.b1}`,borderRadius:20,color:C.t3,fontSize:11,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.background=C.s3;e.currentTarget.style.color=C.t1;}} onMouseLeave={e=>{e.currentTarget.style.background=C.s2;e.currentTarget.style.color=C.t3;}}>{label}</button>
      )}
    </div>}
  </div>;
}


function TasksApp(){
  const stock=JSON.parse(localStorage.getItem("lmct_stock")||"[]");
  const cust=JSON.parse(localStorage.getItem("lmct_cust")||"[]");
  // Check if manager (ul) from URL param or localStorage
  const ul=localStorage.getItem("lmct_ul")==="1";
  return <TodaysTasks stock={stock} cust={cust} ul={ul}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<TasksApp/>);
</script>
</body>
</html>
